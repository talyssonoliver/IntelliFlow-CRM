  - fingerprint: '8058d06e429b929edb6b8c1cd8cfa318032e6a4cbb7fcae47427c0fbc70de08a'
    reason: >-
      Accepted design behaviour, not a defect — flagged here for product review.
      The New Lead form was specced with Lead Source OPTIONAL (placeholder
      "Select a source..."), and createLeadSchema deliberately sets
      `source: leadSourceSchema.default('WEBSITE')`, so an unselected source
      intentionally falls through to that server default. mapSourceToEnum returns
      undefined for a blank selection (the create payload omits `source`); the
      actual bug — the previous blank -> 'OTHER' mislabel — is fixed and covered
      by a regression test. Codex flip-flopped on this exact line (first flagged
      blank -> OTHER, now flags blank -> WEBSITE-default), confirming this is a
      subjective classification preference rather than a correctness bug. Making
      Lead Source a required field (the only resolution codex would accept) is a
      product/UX change that reverses the form's spec'd optional-source design
      and is out of PG-060's scope; raised to the operator for an explicit
      decision. The fingerprint is source-anchored, so this re-blocks if the
      blank-source handling changes.
    author: talyssonoliver
    date: '2026-06-12'
  - fingerprint: '036e220e95807cb520dff6bf0fc108ef4ae4884045d844b1f46514da04f0ea58'
    reason: >-
      Accepted as out of scope, raised for product review. Codex wants
      createLeadSchema to require a non-blank qualificationNote whenever
      source === 'OTHER'. That is a form-specific UX rule (the New Lead form
      makes the user specify the "Other" detail), NOT an API-wide invariant:
      OTHER is a legitimate lead source for other createLead callers
      (inbound/bulk) that do not send a qualificationNote, so adding a cross-field
      refinement to the shared createLeadSchema would break those callers and
      over-restrict the API. The qualificationNote bundle is an interim carrier;
      the correct server-side enforcement is a first-class `sourceOther` field
      with its own conditional requirement, owned by IFC-242. The fingerprint is
      source-anchored, so this re-blocks if the schema changes.
    author: talyssonoliver
    date: '2026-06-12'
