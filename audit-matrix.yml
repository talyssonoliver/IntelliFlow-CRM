    required: false
    owner: 'Tech Writer'
    scope: 'repo'
    command: 'pnpm exec markdownlint "**/*.md"'
    thresholds: {}
    expected_outputs: ['log']

  - id: codeql-analysis
    tier: 2
    enabled: false
    required: false
    owner: 'Security'
    scope: 'repo'
    command: null
    thresholds: {}
    expected_outputs: ['sarif']
    ci_workflow: '.github/workflows/security.yml#codeql-analysis'

  - id: bearer
    tier: 2
    enabled: false
    required: false
    owner: 'Security'
    scope: 'repo'
    command: 'bearer scan .'
    thresholds: {}
    expected_outputs: ['log', 'json']

  - id: osv-scanner
    tier: 2
    enabled: false
    required: false
    owner: 'Security'
    scope: 'repo'
    command: 'osv-scanner -r .'
    thresholds: {}
    expected_outputs: ['log', 'json']

  - id: stryker
    tier: 2
    enabled: false
    required: false
    owner: 'QA Lead'
    scope: 'workspace'
    command: 'pnpm exec stryker run'
    thresholds:
      mutation_score_min: 80
    expected_outputs: ['log', 'json']

  - id: madge-circular
    tier: 2
    enabled: true
    required: false
    owner: 'Architecture'
    scope: 'repo'
    command: 'pnpm exec madge --circular .'
    thresholds: {}
    expected_outputs: ['log']

  # ---------------------------------------------------------------------------
  # Code Review Gates (Tier 2)
  # Comprehensive code analysis integrated with STOA workflow
  # ---------------------------------------------------------------------------
  - id: code-review-analysis
    tier: 2
    enabled: true
    required: false
    owner: 'Tech Lead'
    scope: 'workspace'
    description: 'Comprehensive code review analysis (typecheck, lint, deadcode, complexity)'
    command: 'pwsh scripts/code-review-analysis.ps1 -Sprint {sprint} -TaskId {taskId} -LinkToGates -Quick'
    thresholds: {}
    expected_outputs: ['log', 'json']
    output_dir: '.specify/sprints/sprint-{sprint}/reports/code-review/{runId}/'
    gate_linkage:
      typecheck: 'turbo-typecheck.log'
      lint: 'eslint.log'

  - id: code-review-full
    tier: 2
    enabled: true
    required: false
    owner: 'Tech Lead'
    scope: 'workspace'
    description: 'Full code review with coverage and complexity (slower, more thorough)'
    command: 'pwsh scripts/code-review-analysis.ps1 -Sprint {sprint} -TaskId {taskId} -LinkToGates -Full'
    thresholds: {}
    expected_outputs: ['log', 'json']
    output_dir: '.specify/sprints/sprint-{sprint}/reports/code-review/{runId}/'

  - id: package-review-priority
