schema_version: '1.0.0'
last_updated: '2026-03-05'
maintainer: 'Tech Lead'

# Canonical tool matrix for system audits.
# - tier 1: blockers (fail PR if required=true and tool fails)
# - tier 2: warnings (do not fail PR unless --fail-on-warn)
# - tier 3: scheduled (nightly/manual)
#
# Notes:
# - Some tools are defined but disabled until the repo/team standardizes installation.
# - Enable/disable and enforcement are controlled here; the runner is deterministic.
tools:
  # ---------------------------------------------------------------------------
  # Tier 1 blockers
  # ---------------------------------------------------------------------------
  - id: turbo-typecheck
    tier: 1
    enabled: true
    required: true
    owner: 'Tech Lead'
    scope: 'workspace'
    command: 'pnpm run typecheck'
    thresholds: {}
    expected_outputs: ['log']

  - id: turbo-build
    tier: 1
    enabled: true
    required: true
    owner: 'Tech Lead'
    scope: 'workspace'
    command: 'pnpm run build'
    thresholds: {}
    expected_outputs: ['log']

  - id: turbo-test-coverage
    tier: 1
    enabled: true
    required: true
    owner: 'QA Lead'
    scope: 'workspace'
    command: 'pnpm exec turbo run test:coverage'
    thresholds:
      coverage_min: 90
    expected_outputs: ['log']

  - id: eslint-max-warnings-0
    tier: 1
    enabled: true
    required: true
    owner: 'Frontend Dev'
    scope: 'workspace'
    command: 'pnpm exec eslint --max-warnings=0 .'
    thresholds:
      max_warnings: 0
    expected_outputs: ['log']

  - id: prettier-check
    tier: 1
    enabled: true
    required: true
    owner: 'Tech Lead'
    scope: 'workspace'
    command: 'pnpm run format:check'
    thresholds: {}
    expected_outputs: ['log']

  # SonarQube: kept in Tier 1 but not required until CI secrets + server are configured.
  - id: sonarqube-scanner
    tier: 1
    order: 10
    enabled: true
    required: false
    owner: 'DevOps Engineer'
    scope: 'workspace'
    command: 'node scripts/sonarqube-helper.js analyze'
    timeout_seconds: 600
    thresholds:
      quality_gate: 'A'
      technical_debt_ratio_max: 3
    expected_outputs: ['log']
    requires_env: ['SONAR_TOKEN']

  - id: sonarqube-quality-gate
    tier: 1
    order: 20
    enabled: true
    required: false
    owner: 'DevOps Engineer'
    scope: 'workspace'
    command: 'node scripts/sonar-status.js'
    timeout_seconds: 60
    thresholds: {}
    expected_outputs: ['log']
    requires_env: ['SONAR_TOKEN']

  # Commit linting: implemented as a deterministic repo script (avoids global installs).
  - id: commitlint
    tier: 1
    enabled: true
    required: true
    owner: 'Tech Lead'
    scope: 'git'
    command: 'python tools/audit/commit_msg_lint.py --count 20'
    thresholds: {}
    expected_outputs: ['log']

  # Security/scanning tools (defined, but disabled by default until standardized installs land).
  - id: gitleaks
    tier: 1
    enabled: true
    required: true
    owner: 'Security'
    scope: 'repo'
    command: 'python tools/audit/gitleaks_scan.py'
    thresholds:
      findings_max: 0
    expected_outputs: ['log', 'json']

  - id: pnpm-audit-high
    tier: 1
    enabled: true
    required: true
    owner: 'Security'
    scope: 'workspace'
    # Audit gate runs at --audit-level=critical (fails the workflow on any
    # critical vuln) PLUS a numerical ratchet on `max_high`. Current baseline
    # is 22 high-severity transitives from @lhci/cli > proxy-agent chain,
    # fast-uri, basic-ftp. The ratchet is set to 25 so adding any NEW high
    # vuln triggers the gate (3-vuln buffer for transient lockfile churn);
    # tighten toward 0 as Dependabot lands fixes upstream.
    #
    # Why not --audit-level=high: that would block every PR while we have
    # any high vuln on main, even ones that aren't this PR's fault. The
    # ratchet model lets a PR pass if it doesn't make things worse, while
    # still catching regression. Lower max_high as the count drops upstream.
    command: 'pnpm audit --audit-level=critical'
    thresholds:
      max_high: 25
      max_critical: 0
    expected_outputs: ['log', 'json']

  - id: snyk
    tier: 1
    enabled: true
    # Pre-MVP: required=false until SNYK_TOKEN is wired in repo secrets.
    # Today the gate always reports `skipped` (requires_env unmet), and a
    # skipped required tier-1 gate fails the whole audit. Flip to true
    # once the token is configured and the Snyk CLI is installed in the
    # audit workflow.
    required: false
    owner: 'Security'
    scope: 'workspace'
    command: 'snyk test --severity-threshold=high'
    thresholds:
      max_high: 0
      max_critical: 0
    expected_outputs: ['log', 'json']
    requires_env: ['SNYK_TOKEN']

  - id: trivy-image
    tier: 1
    enabled: true
    # Pre-MVP: required=false until a Docker build + push step exists in CI
    # that publishes an image and exports TRIVY_IMAGE_TAG. Today the gate
    # always reports `skipped` (no image to scan). Flip to true once the
    # image-build step lands.
    required: false
    owner: 'Security'
    scope: 'workspace'
    # TRIVY_IMAGE_TAG must be set by the workflow after a docker build step.
    # When unset (no image built in this run) the tool is skipped — not failed.
    # Set TRIVY_IMAGE_TAG=intelliflow-crm:latest in the workflow env after build.
    command: 'trivy image --severity HIGH,CRITICAL --exit-code 1 $TRIVY_IMAGE_TAG'
    thresholds:
      max_high: 0
      max_critical: 0
    expected_outputs: ['log']
    requires_env: ['TRIVY_IMAGE_TAG']

  - id: semgrep-security-audit
    tier: 1
    enabled: true
    required: true
    owner: 'Security'
    scope: 'repo'
    command: 'semgrep --config=p/security-audit --error'
    thresholds:
      max_findings: 0
    expected_outputs: ['log', 'json']

  - id: dependency-cruiser-validate
    tier: 1
    enabled: true
    required: true
    owner: 'Architecture'
    scope: 'repo'
    command: 'pnpm exec depcruise --config .dependency-cruiser.cjs packages apps --output-type err'
    thresholds: {}
    expected_outputs: ['log']

  - id: a11y-route-reconcile
    tier: 1
    enabled: true
    required: true
    owner: 'QA Lead'
    scope: 'workspace'
    command: 'npx tsx tools/scripts/a11y-route-reconcile.ts'
    thresholds: {}
    expected_outputs: ['log', 'json']

  - id: docs-integrity-audit
    tier: 1
    enabled: false
    required: true
    owner: 'Tech Writer'
    scope: 'workspace'
    command: 'npx tsx tools/scripts/docs-integrity-audit.ts'
    thresholds: {}
    expected_outputs: ['log', 'json']

  # ---------------------------------------------------------------------------
  # Tier 2 warnings
  # ---------------------------------------------------------------------------
  - id: knip
    tier: 2
