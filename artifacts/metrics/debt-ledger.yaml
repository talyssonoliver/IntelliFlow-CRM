    status: open
    expiry_date: 2026-08-31
    remediation_sprint: 20
    remediation_plan: 'Change the save serialization to a nullish check: account.revenue != null ? new Decimal(account.revenue.toString()) : null (the reconstitute path at :46 already maps a stored Decimal(0) correctly). Add a Prisma-backed revenue=0 round-trip regression test. If the product decides $0 revenue accounts are valid, also relax create/update/updateRevenue schemas from positive() to nonnegative() in the same change for end-to-end consistency. Out of IFC-270 scope (adapter layer; audit section 12 = router/validators/service).'
    notes: 'git issue #406. IFC-270 out-of-scope finding. Adapter-layer defect, pre-existing. Tracked per project Rule 8 (file issues for out-of-scope findings).'
