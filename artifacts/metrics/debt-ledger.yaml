    description: 'apps/web/src/lib/export/csv.ts escapeCSVField (line 17) does RFC-4180 quoting (comma/quote/newline) but does NOT neutralise formula-injection cells (leading = + - @ TAB CR). CRM data exported via exportToCSV/objectsToCSV/arrayToCSV and opened in Excel/Sheets/LibreOffice executes attacker-controlled formulas (e.g. a lead/company/notes field = =HYPERLINK(...) / =WEBSERVICE(...) / DDE). OWASP CSV injection on the EXPORT path. Found during PG-063 (which guards the IMPORT path by rejecting formula-injection free-text cells with a surfaced row error).'
