    severity: medium
    description: 'PrismaAccountRepository.save (packages/adapters/src/repositories/PrismaAccountRepository.ts:63) serializes revenue with a truthiness check: account.revenue ? new Decimal(account.revenue.toString()) : null. A legitimate revenue of 0 is falsy, so it is silently persisted as NULL (reloads as undefined — data loss). Latent: no API path can currently feed 0 (createAccountSchema/updateAccountSchema/updateAccountRevenueSchema all use z.number().positive()). Found during IFC-270 via the codex semantic-review gate (waived fingerprint 00ce5862).'
