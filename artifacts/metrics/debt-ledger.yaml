  CONTACT-MUTATION-TENANT-SCOPE-001:
    origin_task: IFC-265
    owner: Backend Dev
    severity: high
    description: 'contact.router update/updateEmail/unlinkFromAccount delegate to the singleton ContactService, whose updateContactInfo/updateContactEmail/disassociateFromAccount call contactRepository.findById(id) with NO tenant argument (packages/application/src/services/ContactService.ts:142,173,267) — unlike accountRepository.findById(id, tenantId). Those paths have NO router-level tenant-scoped preflight (delete/addNote/bulkDelete DO, via ctx.prismaWithTenant.findUnique/findMany). Cross-tenant isolation for the 3 mutation paths relies entirely on the Postgres RLS session var SET app.current_tenant_id issued by createTenantScopedPrisma $extends (apps/api/src/security/tenant-context.ts:146-162), which is set on ctx.prismaWithTenant, NOT on the container singleton service prisma. Session vars are per-connection; not statically verifiable that a foreign findById through ContactService fails closed. Found during IFC-265 via the codex semantic-review gate (3 HIGH mocked-tenant-isolation findings).'
    created_at: 2026-06-13
    status: resolved
    resolved_at: 2026-06-13
    expiry_date: 2026-08-31
    remediation_sprint: 20
    remediation_plan: 'Verify the actual RLS policy + connection behaviour for the container-service prisma. If not fail-closed, add a router-level tenant-scoped preflight to update/updateEmail/unlinkFromAccount (ctx.prismaWithTenant.contact.findUnique -> NOT_FOUND, parity with delete/addNote) OR thread tenantId through the ContactService mutation contract + repository findById. Then strengthen the IFC-265 tenant tests to mock prismaWithTenant.contact.findUnique -> null and assert the mutation service is NOT called for a foreign id. Blast radius: existing update/updateEmail/unlink unit tests mock the service (not findUnique) and will need findUnique mocks added.'
    resolution: 'FIXED in fix/issue-420 (PR closing #420). Added router-level assertContactInTenant(typedCtx, contactId) helper (contact.router.ts) — findFirst({ where: createTenantWhereClause(typedCtx.tenant, {id}) }) via the request-scoped prismaWithTenant, the SAME tenant+owner/team/admin access predicate the reads use (getById/getByEmail/search), BEFORE delegating to the singleton service; out-of-scope contact (other tenant/owner/absent) -> NOT_FOUND. Applied to update, updateEmail, unlinkFromAccount AND linkToAccount (STOA-Security review found linkToAccount shared the identical gap — class closed). The owner-scope dimension was added after codex (HIGH) flagged that a tenant-only check let a non-admin mutate another user''s same-tenant contact. Real cross-tenant denial tests in contact.router.tenant.test.ts (findFirst -> null -> NOT_FOUND, mutation service never invoked; + a WHERE owner-scope assertion) — not the IFC-265 false-isolation pattern. Existing update/link/unlink/contract unit tests given same-tenant findFirst defaults. STOA-Security: PASS-WITH-RECOMMENDATIONS.'
    notes: 'git issue #420. IFC-265 surfaced this. Resolved as a focused security fix loop (security-lead/backend-architect, /stoa-security). NOTE (LOW, separate): delete/addNote use RLS-filtered prismaWithTenant.findUnique without an explicit tenantId/owner comparison (request-scoped client, lower risk) — pre-existing, noted by the review, out of scope.'
  CONTACT-EMAIL-UNIQ-TENANT-SCOPE-001:
    origin_task: '#420'
    owner: Backend Dev
    severity: medium
    description: 'ContactService.updateContactEmail checks for a duplicate via contactRepository.findByEmail(email) (packages/application/src/services/ContactService.ts:~184; PrismaContactRepository.ts:170) — email-only, NOT tenant-scoped — but Contact uses @@unique([tenantId,email]). So a cross-tenant contact with the same email yields a false "Email already in use by another contact" conflict AND leaks that another tenant has that email (cross-tenant email enumeration). Distinct from #420 (which fixed the router-level ACCESS preflight for which contact you may mutate); this is the SERVICE/ADAPTER-layer duplicate-detection on the new email value. Found via the codex semantic-review gate during #420 (unscoped-email-uniqueness, fingerprint 4eb8fc76).'
    created_at: 2026-06-13
    status: open
    expiry_date: 2026-08-31
    remediation_sprint: 20
    remediation_plan: 'Thread tenantId into updateContactEmail(id, email, userId, tenantId) and add a tenant-scoped duplicate lookup (findByEmailInTenant(email, tenantId) or where: { tenantId, email }) matching @@unique([tenantId,email]). Audit other findByEmail callers (getContactByEmail) for the same scoping. Add a test: same email in two tenants -> same-tenant update succeeds, no cross-tenant conflict/leak.'
    notes: 'git issue #427. Out of #420 scope (router-preflight). Pre-existing; cross-package blast radius (findByEmail signature + callers). Waived in tools/audit/codex-review-waivers.yaml (fingerprint 4eb8fc76) with this follow-up, per the out-of-scope-with-follow-up convention (PG-062 #412 precedent). Tracked per project Rule 8.'
