# Trivy Security Scanner Configuration
# Used for container image and filesystem vulnerability scanning
# Reference: https://trivy.dev/latest/docs/references/configuration/config-file/

# Which scanners to run
scanners:
  - vuln
  - misconfig
  - secret
  - license

# Severity levels to report
severity:
  - CRITICAL
  - HIGH
  - MEDIUM
  - LOW

# Exit code: 0 = always succeed (SARIF must be written before failing the step)
exit-code: 0

# Package types to scan
pkg:
  types:
    - os
    - library

# Database settings
db:
  skip-update: false
  repository:
    - ghcr.io/aquasecurity/trivy-db:2

# Cache settings (also holds global options: debug, quiet, timeout, insecure)
cache:
  dir: ~/.cache/trivy
  quiet: false
  timeout: 5m0s

# Misconfiguration scanning
misconfiguration:
  scanners:
    - dockerfile
    - terraform
    - kubernetes
    - cloudformation
  include-non-failures: false

# Secret scanning
secret:
  config: ''

# License scanning
license:
  forbidden:
    - GPL-2.0
    - GPL-3.0
    - AGPL-1.0
    - AGPL-3.0

# Skip directories and files
image:
  skip-dirs:
    - node_modules
    - .git
    - .next
    - .turbo
    - dist
    - build
    - coverage
    - artifacts
  skip-files:
    - '*.lock'
    - 'pnpm-lock.yaml'
    - 'package-lock.json'
    - 'yarn.lock'
