# Routing Rules Configuration — IFC-030: Smart Lead Routing
# Reference: ADR-017 (Routing Determinism)
#
# This file documents the routing rules configuration schema.
# The service reads rules from the RoutingRule Prisma model at runtime,
# NOT from this file.

schema:
  version: '1.0.0'
  taskId: 'IFC-030'

condition_fields:
  - name: leadScore
    type: number
    operators: [equals, not_equals, greater_than, less_than]
    description: 'Lead score (0-100)'
  - name: leadSource
    type: string
    operators: [equals, not_equals, in, not_in]
    description: 'Lead acquisition source'
  - name: leadStatus
    type: string
    operators: [equals, not_equals, in, not_in]
    description: 'Current lead status'
  - name: estimatedValue
    type: number
    operators: [equals, not_equals, greater_than, less_than]
    description: 'Estimated deal value (nullable)'
  - name: location
    type: string
    operators: [equals, not_equals, contains, in, not_in]
    description: 'Lead location (nullable)'
  - name: tags
    type: string[]
    operators: [contains, in, not_in]
    description: 'Lead tags array'

operators:
  equals: 'Exact match'
  not_equals: 'Not equal'
  greater_than: 'Numeric greater than (numbers only)'
  less_than: 'Numeric less than (numbers only)'
  in: 'Value in set (arrays) or any array element in set'
  not_in: 'Value not in set'
  contains: 'Substring match (strings) or any element match (arrays). NOT valid for numeric fields — throws error.'

action_types:
  - assign_to_user: 'Assign lead to specific user by ID'
  - assign_to_team: 'Assign lead to team queue'
  - assign_by_skill: 'Assign to agent with matching skill'
  - notify: 'Send notification'
  - escalate: 'Escalate to senior agent'

routing_reasons:
  - rule_match: 'Lead matched a routing rule'
  - skill_match: 'Agent selected by skill proficiency'
  - load_balance: 'Agent selected by lowest load'
  - manual: 'Manual assignment via assignLead'
  - escalation: 'Escalated routing'

strategy_evaluation_order:
  1: 'Rule match — first matching active rule by priority DESC'
  2: 'Skill match — HOT leads (score >= 80) routed to highest proficiency'
  3: 'Load balance — lowest currentCapacity agent'
  4: 'No match — error thrown'

example_rules:
  hot_lead_priority:
    name: 'HOT Lead Priority Routing'
    priority: 20
    isActive: true
    conditions:
      - field: leadScore
        operator: greater_than
        value: 80
    actions:
      - type: assign_by_skill
        target: sales

  enterprise_lead:
    name: 'Enterprise Lead to Senior Sales'
    priority: 15
    isActive: true
    conditions:
      - field: estimatedValue
        operator: greater_than
        value: 10000
      - field: tags
        operator: contains
        value: enterprise
    actions:
      - type: assign_to_user
        target: senior-sales-agent-id

  cold_lead_balance:
    name: 'Cold Lead Load Balance'
    priority: 5
    isActive: true
    conditions:
      - field: leadScore
        operator: less_than
        value: 30
    actions:
      - type: assign_to_team
        target: general-sales-team
