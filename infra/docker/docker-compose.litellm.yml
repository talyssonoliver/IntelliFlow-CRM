version: '3.9'

# LiteLLM Proxy — single OPENAI_BASE_URL target for all IntelliFlow chains.
# Start: docker compose -f infra/docker/docker-compose.litellm.yml up -d
# Docs:  https://docs.litellm.ai/docs/proxy/deploy

services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: intelliflow-litellm
    restart: unless-stopped
    ports:
      - '4000:4000'
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    environment:
      # Master key — set in host .env (never hard-code)
      LITELLM_MASTER_KEY: '${LITELLM_MASTER_KEY}'
      # Optional: PostgreSQL for budget tracking / virtual-key management
      LITELLM_DATABASE_URL: '${LITELLM_DATABASE_URL:-}'
      # Provider API keys forwarded to the proxy process
      OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY:-}'
      GROQ_API_KEY: '${GROQ_API_KEY:-}'
      GEMINI_API_KEY: '${GEMINI_API_KEY:-}'
      MISTRAL_API_KEY: '${MISTRAL_API_KEY:-}'
      OPENROUTER_API_KEY: '${OPENROUTER_API_KEY:-}'
      OLLAMA_BASE_URL: '${OLLAMA_BASE_URL:-http://host.docker.internal:11434}'
    command: ['--config', '/app/config.yaml', '--port', '4000']
    # Windows-compatible health check (no host-network mode needed)
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health/liveliness']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Let the proxy reach the host-machine Ollama service on Windows/Mac
    extra_hosts:
      - 'host.docker.internal:host-gateway'
