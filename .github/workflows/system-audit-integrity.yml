name: System Audit Integrity (Cache Bypass)

on:
  schedule:
    - cron: '0 4 * * 0' # weekly, Sunday 04:00 UTC
  workflow_dispatch: {}

concurrency:
  group: system-audit-integrity
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  TURBO_TOKEN: '' # disable remote cache
  TURBO_TEAM: ''
  TURBO_CACHE_DIR: .turbo
  TURBO_FORCE: 'true' # force execution (ignore cache)

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies (no cache)
        run: pnpm install --frozen-lockfile

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python deps
        # semgrep is REQUIRED — run_audit.py shells out to it for the
        # semgrep-security-audit check. Without it the audit reports
        # `semgrep: not found` and the integrity run fails. Mirrors the
        # working system-audit.yml which installs semgrep here.
        run: pip install pyyaml pytest semgrep

      - name: Run audit tool tests
        run: python -m pytest tools/audit/tests -q

      - name: Build library packages
        # The cache-bypass audit invokes `turbo run build` internally, which
        # compiles @intelliflow/web. That build collects page data for routes
        # like /api/trpc/[trpc], which fail at module-load unless the same env
        # guards CI's Build job sets are present. This step (and the env block
        # on the audit step below) mirror system-audit.yml so the integrity
        # run reproduces the normal CI build environment — which is the whole
        # point of a cache-bypass integrity check.
        run: pnpm exec turbo run build --filter=!@intelliflow/web --filter=!@intelliflow/api --filter=!@intelliflow/project-tracker --filter=!@intelliflow/workers
        env:
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-audit-stub-key-not-used-at-runtime' }}
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}

      - name: Run Tier 1 full-scope audit (cache bypass)
        env:
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-audit-stub-key-not-used-at-runtime' }}
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
        run: |
          RUN_ID="integrity-${{ github.run_id }}-${{ github.run_attempt }}"
          python tools/audit/run_audit.py --tier 1 --scope full --run-id "$RUN_ID"

      - name: Upload audit bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: system-audit-integrity-${{ github.run_id }}
          path: artifacts/reports/system-audit/integrity-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 30
