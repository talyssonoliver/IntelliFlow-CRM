name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type (major, minor, patch, prerelease)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - prerelease

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  check-release:
    name: Check Release Needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release needed
        id: check
        run: |
          # Get the latest tag; fall back to v0.0.0 sentinel if none exists
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"

          # Resolve the commit range: if the tag doesn't exist as a ref
          # (first-release bootstrap), count from the repo's first commit.
          if git rev-parse -q --verify "${latest_tag}^{commit}" >/dev/null 2>&1; then
            range="${latest_tag}..HEAD"
          else
            echo "Tag ${latest_tag} does not exist as a ref — counting from first commit."
            range="HEAD"
          fi

          # Check if there are commits since last tag
          commits_since_tag=$(git rev-list ${range} --count)
          echo "Commits since tag: $commits_since_tag"

          if [ "$commits_since_tag" -gt 0 ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT

            # Parse version
            version=${latest_tag#v}
            IFS='.' read -r major minor patch <<< "$version"

            # Increment based on commit messages or manual input
            release_type="${{ github.event.inputs.release-type }}"
            if [ -z "$release_type" ]; then
              # Auto-detect from commit messages
              if git log ${range} --format=%s | grep -qE '^feat!:|^fix!:|BREAKING CHANGE:'; then
                release_type="major"
              elif git log ${range} --format=%s | grep -qE '^feat:'; then
                release_type="minor"
              else
                release_type="patch"
              fi
            fi

            # Calculate new version
            case "$release_type" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              prerelease)
                patch=$((patch + 1))
                new_version="${major}.${minor}.${patch}-rc.$(date +%s)"
                echo "new_version=$new_version" >> $GITHUB_OUTPUT
                exit 0
                ;;
            esac

            new_version="${major}.${minor}.${patch}"
            echo "new_version=$new_version" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [check-release]
    if: needs.check-release.outputs.should_release == 'true'
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$latest_tag" ]; then
            # First release
            changelog=$(git log --format="* %s (%h)" --reverse)
          else
            # Generate changelog since last tag
            changelog=$(git log ${latest_tag}..HEAD --format="* %s (%h)" --reverse)
          fi

          # Categorize commits
          features=$(echo "$changelog" | grep -E '^\* feat:' || true)
          fixes=$(echo "$changelog" | grep -E '^\* fix:' || true)
          docs=$(echo "$changelog" | grep -E '^\* docs:' || true)
          chores=$(echo "$changelog" | grep -E '^\* (chore|ci|build|refactor|perf|test):' || true)
          breaking=$(echo "$changelog" | grep -E '^\* .*!:' || true)

          # Build structured changelog
          structured_changelog="## What's Changed"

          if [ -n "$breaking" ]; then
            structured_changelog="${structured_changelog}\n\n### Breaking Changes\n${breaking}"
          fi

          if [ -n "$features" ]; then
            structured_changelog="${structured_changelog}\n\n### Features\n${features}"
          fi

          if [ -n "$fixes" ]; then
            structured_changelog="${structured_changelog}\n\n### Bug Fixes\n${fixes}"
          fi

          if [ -n "$docs" ]; then
            structured_changelog="${structured_changelog}\n\n### Documentation\n${docs}"
          fi

          if [ -n "$chores" ]; then
            structured_changelog="${structured_changelog}\n\n### Other Changes\n${chores}"
          fi

          # Save to file for artifact
          echo "$structured_changelog" > CHANGELOG_DRAFT.md

          # Save to output (escape newlines)
          {
            echo 'changelog<<EOF'
            echo "$structured_changelog"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Upload changelog draft
        uses: actions/upload-artifact@v7
        with:
          name: changelog-draft
          path: CHANGELOG_DRAFT.md
          retention-days: 7

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [check-release, generate-changelog]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pre-build internal packages so vitest can resolve @intelliflow/*
      # via their dist/ entry. Mirrors the `test` job in ci.yml.
      - name: Build internal packages
        run: pnpm turbo run build --filter=!@intelliflow/web --filter=!@intelliflow/api --filter=!@intelliflow/project-tracker --filter=!@intelliflow/workers

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          # All module-load guards must be satisfied or `next build` fails
          # at page-data collection. Mirror the env block from ci.yml > Build
          # so the release build has the same stubs available.
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-build-stub-key-not-used-at-runtime' }}
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}

      - name: Create release archive
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/intelliflow-crm-${{ needs.check-release.outputs.new_version }}.tar.gz \
            apps/*/dist \
            apps/*/.next \
            package.json \
            pnpm-lock.yaml \
            turbo.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-build
          path: release-artifacts/
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-release, generate-changelog, build-release]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-build
          path: release-artifacts

      # Tag-only release: branch protection on main forbids direct pushes
      # (must go through a PR), so we no longer attempt to commit a version
      # bump from inside the workflow. The git tag is the source of truth
      # for the version; package.json version bumps land via regular dev
      # PRs when needed. Tags themselves are not branch-protected.
      - name: Configure git identity for tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create git tag
        run: |
          git tag -a "v${{ needs.check-release.outputs.new_version }}" -m "Release v${{ needs.check-release.outputs.new_version }}"
          git push origin "v${{ needs.check-release.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-release.outputs.new_version }}
          name: Release v${{ needs.check-release.outputs.new_version }}
          body: |
            # IntelliFlow CRM v${{ needs.check-release.outputs.new_version }}

            ${{ needs.generate-changelog.outputs.changelog }}

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ needs.check-release.outputs.new_version }}...HEAD
          files: |
            release-artifacts/*.tar.gz
          draft: false
          prerelease: ${{ contains(needs.check-release.outputs.new_version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest
    needs: [check-release, generate-changelog, create-release]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update CHANGELOG.md
        run: |
          version="${{ needs.check-release.outputs.new_version }}"
          date=$(date +%Y-%m-%d)

          # Create or update CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to IntelliFlow CRM will be documented in this file." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/)," >> CHANGELOG.md
            echo "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Prepare new entry
          cat > new_entry.txt << 'ENTRY_EOF'
          ## [${version}] - ${date}

          ${{ needs.generate-changelog.outputs.changelog }}

          ENTRY_EOF

          # Replace variables in the entry
          sed -i "s/\${version}/${version}/g" new_entry.txt
          sed -i "s/\${date}/${date}/g" new_entry.txt

          # Insert after header
          if grep -q "^## \[" CHANGELOG.md; then
            # Insert before first existing version
            awk '/^## \[/{if(!inserted){system("cat new_entry.txt");inserted=1}}{print}' CHANGELOG.md > CHANGELOG.md.tmp
          else
            # Append at the end
            cat CHANGELOG.md new_entry.txt > CHANGELOG.md.tmp
          fi
          mv CHANGELOG.md.tmp CHANGELOG.md
          rm new_entry.txt

      # Open a PR with the CHANGELOG update instead of pushing to main
      # directly — branch protection requires changes go through PRs. The
      # PR is created in draft and labeled so a human (or auto-merge rule)
      # decides when to land it.
      - name: Open CHANGELOG PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.check-release.outputs.new_version }}"
          branch="docs/changelog-v${version}"
          if ! git diff --quiet -- CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$branch"
            git add CHANGELOG.md
            git commit -m "docs: update CHANGELOG.md for v${version}"
            git push -u origin "$branch"
            gh pr create \
              --base main \
              --head "$branch" \
              --title "docs: update CHANGELOG.md for v${version}" \
              --body "Automated CHANGELOG update following the v${version} release tag."
          else
            echo "No CHANGELOG changes to commit"
          fi

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should_release == 'true' && success()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "New release published: v${{ needs.check-release.outputs.new_version }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "New Release: v${{ needs.check-release.outputs.new_version }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "IntelliFlow CRM has been released!"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Release"
                      },
                      "url": "https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-release.outputs.new_version }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
