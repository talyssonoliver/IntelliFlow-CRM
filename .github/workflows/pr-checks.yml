name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]
  # Merge Queue: run PR Checks required contexts (Deploy Preview, PR Summary,
  # PR Validation) on the queue's temp refs. Jobs with draft-only guards
  # (github.event.pull_request.draft == false) use the always() + non-draft
  # guard pattern below and evaluate correctly on merge_group (draft is false
  # on the merge ref). Deploy-only steps are no-ops on merge_group — the shim
  # already emits success without deploying.
  merge_group:
    branches: [main, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  # TURBO_TOKEN reuses VERCEL_TOKEN — see ci.yml env block for rationale.
  TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    # On merge_group events github.event.pull_request is null; the queue only
    # processes non-draft PRs by definition, so we allow the run unconditionally
    # when the trigger is merge_group.
    if: github.event_name == 'merge_group' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR title
        # PR-specific: the merge queue has already validated the title at PR open
        # time. Skip on merge_group events where github.event.pull_request is null.
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # The squash subject is built from the PR TITLE at merge time, so a
          # title whose subject starts upper-case produces a squash commit that
          # CI's system-audit commit_msg_lint.py rejects AFTER merge (recurring:
          # #58 / #118 / #221 / #340, tracked as #227). Mirror the linter's
          # subject-case rule here so the title can't pass review and then red
          # the post-merge commitlint. Proper nouns included — lower-case start.
          subjectPattern: '^(?![A-Z]).+$'
          subjectPatternError: |
            The subject "{subject}" must start with a lower-case letter — the
            squash commit is built from this title and CI's commit_msg_lint
            (system-audit) rejects an upper-case subject. e.g. use
            "feat(ai): openRouter fallback", not "feat(ai): OpenRouter fallback".
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate PR title length (squash subject <= 100)
        # commit_msg_lint.py caps the header at 100 chars; the squash subject is
        # the PR title, so enforce the same cap here (PR_TITLE via env, never
        # interpolated into the script — injection-safe). Dependabot titles can
        # legitimately run long (version tables); it's bot-exempt as elsewhere.
        # Skip on merge_group: already validated when the PR was opened.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          len=${#PR_TITLE}
          if [ "$len" -gt 100 ]; then
            echo "::error::PR title is ${len} chars (max 100). The squash subject is built from the title and CI's commit_msg_lint rejects headers >100. Shorten it."
            exit 1
          fi
          echo "PR title length ${len} <= 100. OK"

      - name: Check branch name
        # Dependabot uses its own `dependabot/<ecosystem>/<dep>-<version>` naming
        # convention that we don't control. Exempt Dependabot PRs from the
        # human-author branch-name regex; the dependabot-bot author check is
        # enough auth signal.
        # Skip on merge_group: branch name was validated at PR open time.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          branch="${{ github.head_ref }}"
          if [[ ! "$branch" =~ ^(feat|fix|docs|refactor|test|chore|agent|ci|build|perf|style|revert)/.+ ]]; then
            echo "Branch name must follow pattern: feat/*, fix/*, docs/*, refactor/*, test/*, chore/*, agent/*, ci/*, build/*, perf/*, style/*, revert/*"
            exit 1
          fi

      - name: Validate PR size
        # Skip on merge_group: github.base_ref is null on merge_group events.
        if: github.event_name == 'pull_request'
        run: |
          changes=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -n1 | grep -oP '\d+(?= insertion)|\d+(?= deletion)' | awk '{sum+=$1} END {print sum}')
          if [ "$changes" -gt 1000 ]; then
            echo "::warning::PR is large ($changes lines changed). Consider breaking it into smaller PRs."
          fi

      # D4: require traceability — a tracked task id, a GitHub issue ref, or an
      # explicit hotfix waiver in the PR body. The body is passed via env (never
      # interpolated into the script) to avoid shell injection from PR content.
      - name: Require task ID or hotfix waiver in PR body
        # Skip on merge_group: already checked when the PR was opened/updated.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          # Accept: a tracked task id (IFC-123, PG-045, S17-AUDIT-001, INFRA-TF-002,
          # EXC-INIT-001, ...), a GitHub issue ref (#123), or an explicit hotfix waiver.
          if printf '%s' "${PR_BODY:-}" | grep -qiE '([A-Z]{2,}(-[A-Z0-9]+)*-[0-9]+|#[0-9]+|\[hotfix\]|hotfix-waiver)'; then
            echo "PR body references a tracked task id / issue / hotfix waiver. OK"
          else
            echo "::error::PR body must reference a tracked task id (e.g. IFC-123, PG-045), a GitHub issue (#123), or include a hotfix waiver marker ([hotfix])."
            exit 1
          fi

      - name: Merge queue pass-through
        # Explicit success step so the job always completes on merge_group refs
        # even when all PR-specific steps above are skipped.
        if: github.event_name == 'merge_group'
        run: echo "merge_group event — PR validations already passed at PR review time. OK"

  # `quality-checks` was removed as part of Recommendation E of
  # docs/operations/ci-cost-audit-2026-05-25.md. It duplicated coverage
  # already provided by ci.yml:
  #   - lint, format:check, validate:a11y-routes → ci.yml `lint` job (a11y
  #     folded in by the PR that introduced this comment)
  #   - typecheck → ci.yml `typecheck` job
  #   - audit:material-symbols → ci.yml `build` job (already runs there
  #     pre-build)
  # `lint:artifacts` was continue-on-error so its removal is intentional.
  #
  # EXTERNAL PRE-MERGE REQUIREMENT: branch protection lives outside this
  # repo and is not updated by merging this file. Before this PR can land,
  # a repo admin must PATCH the required_status_checks set to remove the
  # now-orphan context `PR Checks / Quality Checks` — see the PR
  # description for the exact `gh api` command.

  # `test-coverage` REMOVED (CI Audit F-01 / ADR-057): it ran the full ~30k-test
  # suite a SECOND time per PR (`pnpm run test:coverage`, 16 projects
  # sequentially) on top of ci.yml's run. The sharded suite in
  # test-regression.yml (called by ci.yml on every PR) now produces the merged
  # lcov + Codecov upload + PR coverage comment from a SINGLE execution.
  #
  # `build-preview` REMOVED (CI Audit F-05): it duplicated ci.yml's `build` job
  # (identical `pnpm run build`). ci.yml runs on pull_request, so its Build job
  # is the canonical PR build signal. deploy-preview builds independently via
  # `vercel build`, so it never consumed build-preview's artifact.
  #
  # EXTERNAL PRE-MERGE REQUIREMENT: branch protection lives outside this repo. A
  # repo admin must PATCH required_status_checks to drop the now-orphan contexts
  # `PR Checks / Test Coverage` and `PR Checks / Build Preview` — see ADR-060
  # (docs/architecture/adr/) for the exact `gh api` command.

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    # build-preview removed (F-05); deploy-preview builds independently via
    # `vercel build`, so it no longer depends on a prior build job.
    # Always run for non-draft PRs and on merge_group so the required status
    # context reports a conclusion (not `skipped`). Branch protection treats
    # `skipped` required checks as never-reported, which BLOCKS merge.
    # This job is a required-status SHIM — see comment above for rationale.
    if: github.event_name == 'merge_group' || github.event.pull_request.draft == false
    steps:
      - name: Preview deploy is CI-gated (report-only)
        run: |
          echo "::notice::Preview deploy deferred to deploy-preview.yml (runs after 'CI Pipeline' succeeds)."
          echo "This shim keeps the required 'Deploy Preview' status green; no pre-green build happens here."

  # `security-scan` was removed as part of Recommendation E of
  # docs/operations/ci-cost-audit-2026-05-25.md. It duplicated coverage
  # already provided by .github/workflows/security.yml on every pull_request:
  #   - `pnpm audit --audit-level=high` (continue-on-error) → security.yml
  #     `npm-audit` (`pnpm audit --audit-level=critical`, the policy set by
  #     the security team)
  #   - `trufflesecurity/trufflehog` → security.yml `secret-scanning`
  #     (gitleaks) plus CodeQL + Trivy + OWASP Dependency-Check in the same
  #     workflow.
  #
  # EXTERNAL PRE-MERGE REQUIREMENT: branch protection lives outside this
  # repo and is not updated by merging this file. Before this PR can land,
  # a repo admin must PATCH the required_status_checks set to remove the
  # now-orphan context `PR Checks / Security Scan` — see the PR
  # description for the exact `gh api` command.

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    # Quarantined: gated on the `lighthouse` PR label. Lighthouse asserts
    # against a fixed perf/a11y/SEO bar on the deployed preview; the live
    # app currently misses ~9 assertions per route (bf-cache, color-contrast,
    # csp-xss, errors-in-console, is-crawlable, link-in-text-block, redirects,
    # resource-summary.script.size, splash-screen, total-byte-weight). These
    # are repo-owned debt that needs dedicated fix PRs. Until then, running
    # Lighthouse on every PR just paints the UI red and trains the team to
    # ignore real failures.
    #
    # To opt-in for a specific PR, add the `lighthouse` label. The dedicated
    # cleanup PR will do that explicitly while it lands the fixes.
    #
    # Original gates retained ON TOP of the label gate:
    #   1. PR not draft + head from same repo + deploy-preview produced a URL
    #   2. `vars.VERCEL_BYPASS_CONFIGURED` is "true" (SSO bypass token configured)
    # See docs/operations/runbooks/ci-cost-monitoring.md for bypass setup.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.deploy-preview.outputs.preview-url != '' &&
      vars.VERCEL_BYPASS_CONFIGURED == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'lighthouse')
    permissions:
      # Comment Lighthouse scores step uses github.rest.issues.createComment;
      # default GITHUB_TOKEN doesn't grant PR write on default jobs, so the
      # POST returns 403 "Resource not accessible by integration" and fails
      # the whole job. Grant at job level (kept minimal — not workflow-wide).
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Compose bypass-enabled Lighthouse URLs
        id: urls
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          # Vercel Deployment Protection bypass per
          # https://vercel.com/docs/security/deployment-protection/methods-to-bypass-deployment-protection/protection-bypass-automation
          # The query-param form sets a cookie (x-vercel-set-bypass-cookie=samesitenone)
          # so subresources Lighthouse loads after the initial document also bypass
          # the SSO wall without each URL needing the token appended.
          if [ -z "$BYPASS" ]; then
            echo "::error::VERCEL_BYPASS_CONFIGURED=true but VERCEL_AUTOMATION_BYPASS_SECRET is empty. Set both in repo settings."
            exit 1
          fi
          Q="x-vercel-protection-bypass=${BYPASS}&x-vercel-set-bypass-cookie=samesitenone"
          {
            echo "urls<<URLS_EOF"
            echo "${PREVIEW_URL}?${Q}"
            echo "${PREVIEW_URL}/login?${Q}"
            echo "${PREVIEW_URL}/signup?${Q}"
            echo "${PREVIEW_URL}/pricing?${Q}"
            echo "URLS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.js'
          urls: ${{ steps.urls.outputs.urls }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3

      - name: Comment Lighthouse scores
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const fs = require('fs');
            const resultsPath = '.lighthouseci';

            if (fs.existsSync(resultsPath)) {
              const output = `#### Lighthouse Performance Report

              View full report in artifacts.

              Performance, Accessibility, Best Practices, and SEO scores are available in the CI artifacts.`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }

  # PERF-01: throttled-mobile measurement lane. The desktop `lighthouse` job
  # above runs unthrottled against the preview and scores ~100, hiding a ~16pt
  # mobile gap (LCP/TTI 2.4-8x over target on a real mid-tier phone). This lane
  # reproduces mobile conditions (4x CPU, ~1.6Mbps, 150ms RTT) so that number is
  # visible on every PR. Every assertion in lighthouserc.mobile.js is `warn`, so
  # this job NEVER blocks a PR — it surfaces the score, it does not gate it.
  # Unlike the desktop job it is NOT label-gated; it still requires a preview URL
  # + Vercel bypass to reach the deployment (skips cleanly when absent / forks).
  lighthouse-mobile:
    name: Lighthouse Performance (throttled mobile, warn-only)
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.deploy-preview.outputs.preview-url != '' &&
      vars.VERCEL_BYPASS_CONFIGURED == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Compose bypass-enabled Lighthouse URLs (public pages only)
        id: urls
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          # Vercel Deployment Protection bypass (same mechanism as the desktop
          # lighthouse job): the query-param form sets a samesitenone cookie so
          # subresources Lighthouse loads after the document also bypass the wall.
          if [ -z "$BYPASS" ]; then
            echo "::error::VERCEL_BYPASS_CONFIGURED=true but VERCEL_AUTOMATION_BYPASS_SECRET is empty. Set both in repo settings."
            exit 1
          fi
          Q="x-vercel-protection-bypass=${BYPASS}&x-vercel-set-bypass-cookie=samesitenone"
          {
            echo "urls<<URLS_EOF"
            echo "${PREVIEW_URL}?${Q}"
            echo "${PREVIEW_URL}/login?${Q}"
            echo "${PREVIEW_URL}/pricing?${Q}"
            echo "URLS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse CI (throttled mobile)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.mobile.js'
          urls: ${{ steps.urls.outputs.urls }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Upload mobile Lighthouse JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-mobile
          path: artifacts/lighthouse/mobile/
          if-no-files-found: warn

  # D6 fix (incident-forensics-2026-06-04): boot `next start` in production mode
  # on EVERY pull request so module-load crashes (D1/D2/D4) are caught before
  # merge. Previously the only `next start` job was ci.yml's `e2e` job, gated
  # `if: push && ref == main` — boot crashes reached main before anyone saw red.
  #
  # This job is intentionally lean: build the web app, start it in production
  # mode, assert /api/health returns HTTP 200. No Playwright, no full suite.
  # It is additive — the existing push-to-main e2e job is unchanged.
  #
  # Env block is a verbatim copy of ci.yml e2e job (lines ~347-368) which is
  # the #228/#231-proven set that lets `next start` boot without real secrets.
  # The `${{ secrets.X || 'stub' }}` pattern works on fork PRs (no secret
  # access) because the fallback stub is always available.
  web-boot-smoke:
    name: Web Boot Smoke
    runs-on: ubuntu-latest
    # Run on merge_group to catch boot-crash regressions before the merge lands.
    if: github.event_name == 'merge_group' || github.event.pull_request.draft == false
    timeout-minutes: 15
    env:
      # --- module-load env guards (verbatim from ci.yml e2e job) ---
      # `next start` boots in production mode; every module-init guard that
      # `next build` satisfied must also be satisfied here or the server
      # crashes at import time (defects D1/D2/D4 from incident-forensics-
      # 2026-06-04). These are throwaway CI stubs — never used at runtime.
      PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
      AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-build-stub-key-not-used-at-runtime' }}
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
      # #228 fail-fast: additional URL/host stubs required by module-init code
      # (Redis degrades gracefully; OTel is disabled; AI providers are not
      # exercised by the health endpoint).
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      OTEL_ENABLED: 'false'
      APP_URL: https://stub.example.com
      NEXT_PUBLIC_APP_URL: https://stub.example.com
      OLLAMA_BASE_URL: http://localhost:11434
      LITELLM_BASE_URL: http://localhost:4000/v1
      VAULT_ADDR: http://localhost:8200
      TEMPORAL_ADDRESS: localhost:7233
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          build-libs: 'true'

      - name: Build web app
        # Mirror ci.yml build job: pre-build library deps (handled by build-libs
        # above), then build only the web app so the .next directory exists for
        # `next start`. Turbo remote cache reuses hits from ci.yml's Build job
        # when TURBO_TOKEN + TURBO_TEAM are set, making this step near-instant
        # on re-runs of the same commit.
        run: pnpm --filter @intelliflow/web build
        env:
          NODE_ENV: production

      - name: Start web server (background)
        # Run `next start` in the background. PORT 3000 is the Next.js default.
        # We capture stderr+stdout to a log file so it is printed if the smoke
        # assertion fails — without this the crash is silent and the `curl` step
        # just reports "connection refused" with no root cause.
        run: |
          pnpm --filter @intelliflow/web start --port 3000 > /tmp/next-start.log 2>&1 &
          echo "NEXT_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server ready
        # Poll /api/health until it answers or we time out. /api/health is the
        # dependency-free liveness probe (apps/web/src/app/api/health/route.ts)
        # that returns { status: "ok" } without touching DB or Supabase — exactly
        # the right gate for a boot smoke check. A 5xx or connection refused means
        # the server crashed; we print the captured log and fail fast.
        run: |
          echo "Waiting for next start on :3000 ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Server ready (attempt $i) — HTTP $STATUS"
              exit 0
            fi
            echo "  attempt $i: HTTP ${STATUS:-no-response} — retrying in 5s"
            sleep 5
          done
          echo "::error::Server did not become ready within 150 s"
          echo "--- next start log ---"
          cat /tmp/next-start.log || true
          exit 1

      - name: Assert /api/health returns HTTP 200
        # Belt-and-suspenders: after the poll confirms readiness, do one clean
        # assertion that the response body carries status=ok and no 5xx.
        # Any boot-time crash that managed to limp past the poll step will show
        # here as a 500 (or a non-JSON body) and fail the job.
        run: |
          BODY=$(curl -sf http://localhost:3000/api/health)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
          echo "HTTP status : $STATUS"
          echo "Response    : $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Expected HTTP 200 from /api/health, got $STATUS"
            echo "--- next start log ---"
            cat /tmp/next-start.log || true
            exit 1
          fi
          echo "$BODY" | node -e "
            const b = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            if (b.status !== 'ok') { console.error('status field not ok:', b); process.exit(1); }
            console.log('ok — status:', b.status, 'service:', b.service);
          "

      - name: Assert tRPC container mounts (/api/trpc/health.ping not 5xx)
        # /api/health is dependency-free and does NOT construct the API DI
        # container. The D1/D2/D4 outages were the container throwing at
        # module-load in apps/api (mounted by app/api/trpc/[trpc]/route.ts).
        # health.ping is a publicProcedure with no ctx/DB, so hitting it forces
        # full container construction without needing real infra — a boot-time
        # throw surfaces here as a 5xx. THIS is the assertion that catches the
        # class /api/health misses (defects D1/D2/D4/D6).
        run: |
          URL='http://localhost:3000/api/trpc/health.ping?batch=1&input=%7B%220%22%3A%7B%22json%22%3Anull%7D%7D'
          BODY=$(curl -s "$URL")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "HTTP status : $STATUS"
          echo "Response    : $BODY"
          if [ "$STATUS" -ge 500 ]; then
            echo "::error::tRPC container mount returned $STATUS — the API DI container crashed at boot (D1/D2/D4 class)"
            echo "--- next start log ---"
            cat /tmp/next-start.log || true
            exit 1
          fi
          echo "$BODY" | node -e "
            const txt = require('fs').readFileSync('/dev/stdin','utf8');
            const j = JSON.parse(txt);
            const data = Array.isArray(j) ? j[0] && j[0].result && j[0].result.data : j && j.result && j.result.data;
            const status = (data && data.status) || (data && data.json && data.json.status);
            if (status !== 'healthy') {
              console.error('health.ping did not return status=healthy:', txt);
              process.exit(1);
            }
            console.log('ok — API container mounted; health.ping:', status);
          "

      - name: Print server log on failure
        if: failure()
        run: cat /tmp/next-start.log || true

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    # quality-checks removed from needs as part of Recommendation E dedup —
    # ci.yml's lint + typecheck jobs are the canonical source for those signals
    # and the PR Summary surfaces only pr-checks.yml results.
    # lighthouse dropped from needs: it is label-quarantined (usually skipped)
    # and the summary script does not reference its result — keeping it here was
    # dead weight and a latent branch-protection footgun (CI review 2026-06-03).
    # web-boot-smoke added (D6 fix 2026-06-04): boot-smoke result now appears
    # in the PR summary so reviewers see it alongside validation + deploy.
    needs: [pr-validation, deploy-preview, web-boot-smoke]
    if: always() && (github.event_name == 'merge_group' || github.event.pull_request.draft == false)
    permissions:
      # Default GITHUB_TOKEN doesn't grant PR-write on fork PRs, so the
      # github.rest.issues.createComment call in the script below 403s with
      # "Resource not accessible by integration". Granting pull-requests:write
      # at the JOB level (not workflow level — keeps it minimal) lets the
      # bot comment on the PR. issues:write is also needed because PR
      # comments are technically issue comments under the hood.
      pull-requests: write
      issues: write
    steps:
      - name: Generate summary
        uses: actions/github-script@v9
        with:
          script: |
            const validationStatus = '${{ needs.pr-validation.result }}';
            const deployStatus = '${{ needs.deploy-preview.result }}';
            const bootSmokeStatus = '${{ needs.web-boot-smoke.result }}';

            const statusIcon = (status) => {
              if (status === 'success') return '✅';
              if (status === 'failure') return '❌';
              return '⏭️';
            };

            const output = `## PR Check Summary

            | Check | Status |
            |-------|--------|
            | PR Validation | ${statusIcon(validationStatus)} ${validationStatus} |
            | Deploy Preview | ${statusIcon(deployStatus)} ${deployStatus} |
            | Web Boot Smoke | ${statusIcon(bootSmokeStatus)} ${bootSmokeStatus} |

            > Test, coverage, build, lint and typecheck signals now live in the **CI Pipeline** workflow (sharded suite + merged coverage gate). See ADR-057.

            ${validationStatus === 'success' ? '✅ PR-Checks signals green. Full test/build/coverage gate runs in CI Pipeline.' : '⚠️ Some checks failed. Please review the logs.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
