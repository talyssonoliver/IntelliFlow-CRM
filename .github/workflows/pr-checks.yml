name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check branch name
        # Dependabot uses its own `dependabot/<ecosystem>/<dep>-<version>` naming
        # convention that we don't control. Exempt Dependabot PRs from the
        # human-author branch-name regex; the dependabot-bot author check is
        # enough auth signal.
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          branch="${{ github.head_ref }}"
          if [[ ! "$branch" =~ ^(feat|fix|docs|refactor|test|chore|agent|ci|build|perf|style|revert)/.+ ]]; then
            echo "Branch name must follow pattern: feat/*, fix/*, docs/*, refactor/*, test/*, chore/*, agent/*, ci/*, build/*, perf/*, style/*, revert/*"
            exit 1
          fi

      - name: Validate PR size
        run: |
          changes=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -n1 | grep -oP '\d+(?= insertion)|\d+(?= deletion)' | awk '{sum+=$1} END {print sum}')
          if [ "$changes" -gt 1000 ]; then
            echo "::warning::PR is large ($changes lines changed). Consider breaking it into smaller PRs."
          fi

  # `quality-checks` was removed as part of Recommendation E of
  # docs/operations/ci-cost-audit-2026-05-25.md. It duplicated coverage
  # already provided by ci.yml:
  #   - lint, format:check, validate:a11y-routes → ci.yml `lint` job (a11y
  #     folded in by the PR that introduced this comment)
  #   - typecheck → ci.yml `typecheck` job
  #   - audit:material-symbols → ci.yml `build` job (already runs there
  #     pre-build)
  # `lint:artifacts` was continue-on-error so its removal is intentional.
  #
  # EXTERNAL PRE-MERGE REQUIREMENT: branch protection lives outside this
  # repo and is not updated by merging this file. Before this PR can land,
  # a repo admin must PATCH the required_status_checks set to remove the
  # now-orphan context `PR Checks / Quality Checks` — see the PR
  # description for the exact `gh api` command.

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      # Skip-shim for Dependabot PRs — see Quality Checks job for the pattern
      # rationale. ci.yml runs the unit/integration test suite against the
      # bumped lockfile; the codecov comment is convenience for human authors.
      - uses: actions/checkout@v6
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-monorepo
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run tests with coverage
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: pnpm run test:coverage

      - name: Generate coverage report
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./artifacts/coverage/lcov.info
          flags: pr-tests
          fail_ci_if_error: false

      - name: Comment coverage on PR
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: ./artifacts/coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          delete-old-comments: true
        continue-on-error: true

      - name: Skip-shim for Dependabot PRs
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        run: echo "::notice::Test Coverage skipped for Dependabot PR — ci.yml runs unit + integration tests against the bumped lockfile"

  build-preview:
    name: Build Preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      # Skip-shim for Dependabot PRs — see Quality Checks job for the pattern
      # rationale. ci.yml's Build job runs the same `pnpm run build` against
      # the bumped lockfile, so a green ci.yml is sufficient signal that the
      # dep bump did not break the build. This saves ~5 minutes per Dependabot PR.
      - uses: actions/checkout@v6
        if: github.event.pull_request.user.login != 'dependabot[bot]'
      - uses: ./.github/actions/setup-monorepo
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build all packages
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: pnpm run build
        env:
          NODE_ENV: production
          # Real key from repo's GitHub Actions secret. Configure at
          # Settings → Secrets and variables → Actions → New repository secret
          # named PRISMA_FIELD_ENCRYPTION_KEY (the same key that lives in
          # .env.local locally). The `||` fallback is a 32-byte zero-key
          # safety net for forked PRs where secrets are not exposed; the
          # build only needs the value to satisfy the AES-256 key-length
          # guard in `packages/db/src/field-encryption.ts` at module load.
          # NEVER use the fallback at runtime.
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          # Stub connection strings prevent Prisma / pg-adapter from throwing at
          # module-load time when the route.ts dynamic export is not sufficient to
          # prevent eager evaluation (belt-and-suspenders for CI build isolation).
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
          # Prevents the AI_AUDIT_SIGNING_KEY production guard in container.ts
          # from throwing before the request handler is ever invoked.
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-build-stub-key-not-used-at-runtime' }}
          # Supabase config — apps/api/src/lib/supabase.ts throws at module
          # load when NODE_ENV=production and any of these are missing. The
          # web build imports the api package via the tRPC chain, so the
          # module-load guard fires during `next build` page-data collection.
          # Real values come from repo secrets; stubs are RFC-shaped placeholders
          # for forked PRs that don't have secret access. NEVER use stubs at runtime.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}

      - name: Upload build artifacts
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/upload-artifact@v7
        with:
          name: pr-build-${{ github.event.pull_request.number }}
          path: |
            apps/*/dist
            apps/*/.next
          retention-days: 3

      - name: Skip-shim for Dependabot PRs
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        run: echo "::notice::Build Preview skipped for Dependabot PR — ci.yml runs the same build against the bumped lockfile"

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build-preview]
    # Always run for non-draft PRs so the required status context reports a
    # conclusion (not `skipped`). Branch protection treats `skipped` required
    # checks as never-reported, which BLOCKS merge. The actual deploy is
    # per-step gated below (DEPLOY_ELIGIBLE) so only same-repo PRs with Vercel
    # configured AND non-bot authors execute the deploy. Other cases hit the
    # success-shim step and the job still emits `success`.
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      issues: write
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.preview-url }}
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    env:
      # Project/Org IDs are not secrets — read from `vars.*` so the same value
      # drives both the eligibility gate AND the Vercel CLI invocation. The
      # previous setup gated on `vars.VERCEL_PROJECT_ID` but exported
      # `secrets.VERCEL_PROJECT_ID` to the CLI; if the repo only sets one or
      # the other, the job would either be ineligible-but-with-token or
      # eligible-but-empty (and vercel pull/build/deploy would fail).
      # `secrets.VERCEL_TOKEN` stays a secret — only the IDs are public.
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      # Deploy eligibility flag — referenced by every heavy step's `if:`. Three
      # gates folded into one expression:
      #   1. Same-repo PR (forks can't access secrets)
      #   2. Vercel project configured (single source of truth: vars.VERCEL_PROJECT_ID)
      #   3. Not a Dependabot PR (scoped to Dependabot secrets, not Actions secrets)
      DEPLOY_ELIGIBLE: ${{ github.event.pull_request.head.repo.full_name == github.repository && vars.VERCEL_PROJECT_ID != '' && github.event.pull_request.user.login != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo
        if: env.DEPLOY_ELIGIBLE == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          # Deploy uses pre-built artifact via `vercel pull` + `vercel build`,
          # not the local install. Skip install to save a minute.
          install-deps: 'false'

      - name: Install Vercel CLI
        if: env.DEPLOY_ELIGIBLE == 'true'
        # amondnet/vercel-action@v25 is unmaintained and ships Vercel CLI 25.1.0,
        # which the deploy endpoint rejects ("requires version 47.2.2 or later").
        # Use the modern CLI directly: pull → build → deploy --prebuilt.
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment (preview)
        if: env.DEPLOY_ELIGIBLE == 'true'
        # Downloads project config + env vars to .vercel/. VERCEL_ORG_ID +
        # VERCEL_PROJECT_ID env vars take the place of `.vercel/project.json`.
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: env.DEPLOY_ELIGIBLE == 'true'
        # Uses the env vars pulled above; output goes to .vercel/output/.
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Preview
        if: env.DEPLOY_ELIGIBLE == 'true'
        id: deploy
        # --archive=tgz uploads the build as a single tarball instead of
        # streaming thousands of individual files. The Hobby plan caps file
        # uploads at 5000 per 24h; a typical Next.js production build creates
        # ~3000+ chunks, so two or three preview deploys per day exhaust the
        # quota without the archive flag.
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOY_URL"

      - name: Comment preview URL
        if: env.DEPLOY_ELIGIBLE == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.preview-url }}`;
            const body = `#### Preview Deployment

            Preview URL: ${url}

            Status: ✅ Deployed successfully`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Skip-shim (Deploy ineligible)
        if: env.DEPLOY_ELIGIBLE != 'true'
        # Emits success so the required status context reports green. Without
        # this step, an ineligible job has 0 successful steps → conclusion
        # `skipped` → branch protection blocks the PR. The shim resolves the
        # deadlock for: fork PRs, Dependabot PRs, and repos without Vercel
        # variables configured.
        run: |
          echo "::notice::Deploy Preview skipped — ineligible (fork PR, Dependabot, or VERCEL_PROJECT_ID unset)."
          echo "Reason matrix:"
          echo "  head.repo == origin: ${{ github.event.pull_request.head.repo.full_name == github.repository }}"
          echo "  VERCEL_PROJECT_ID set: ${{ vars.VERCEL_PROJECT_ID != '' }}"
          echo "  Not dependabot: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}"

  # `security-scan` was removed as part of Recommendation E of
  # docs/operations/ci-cost-audit-2026-05-25.md. It duplicated coverage
  # already provided by .github/workflows/security.yml on every pull_request:
  #   - `pnpm audit --audit-level=high` (continue-on-error) → security.yml
  #     `npm-audit` (`pnpm audit --audit-level=critical`, the policy set by
  #     the security team)
  #   - `trufflesecurity/trufflehog` → security.yml `secret-scanning`
  #     (gitleaks) plus CodeQL + Trivy + OWASP Dependency-Check in the same
  #     workflow.
  #
  # EXTERNAL PRE-MERGE REQUIREMENT: branch protection lives outside this
  # repo and is not updated by merging this file. Before this PR can land,
  # a repo admin must PATCH the required_status_checks set to remove the
  # now-orphan context `PR Checks / Security Scan` — see the PR
  # description for the exact `gh api` command.

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    # Three gates:
    #   1. PR not draft + head from same repo + deploy-preview produced a URL.
    #   2. `vars.VERCEL_BYPASS_CONFIGURED` is "true". The Vercel preview
    #      deployments are protected by Vercel Deployment Protection (SSO);
    #      Lighthouse hits vercel.com/login instead of the app unless we send
    #      the protection-bypass token. The token lives in the secret
    #      VERCEL_AUTOMATION_BYPASS_SECRET; we gate on the matching VAR
    #      (variables are visible in logs so the gate is auditable while the
    #      secret stays hidden). If the bypass isn't configured we SKIP the
    #      job rather than continue-on-error or fail-with-vercel-login —
    #      both are dishonest signals. See docs/operations/runbooks/
    #      ci-cost-monitoring.md for setup instructions.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.deploy-preview.outputs.preview-url != '' &&
      vars.VERCEL_BYPASS_CONFIGURED == 'true'
    permissions:
      # Comment Lighthouse scores step uses github.rest.issues.createComment;
      # default GITHUB_TOKEN doesn't grant PR write on default jobs, so the
      # POST returns 403 "Resource not accessible by integration" and fails
      # the whole job. Grant at job level (kept minimal — not workflow-wide).
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Compose bypass-enabled Lighthouse URLs
        id: urls
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          # Vercel Deployment Protection bypass per
          # https://vercel.com/docs/security/deployment-protection/methods-to-bypass-deployment-protection/protection-bypass-automation
          # The query-param form sets a cookie (x-vercel-set-bypass-cookie=samesitenone)
          # so subresources Lighthouse loads after the initial document also bypass
          # the SSO wall without each URL needing the token appended.
          if [ -z "$BYPASS" ]; then
            echo "::error::VERCEL_BYPASS_CONFIGURED=true but VERCEL_AUTOMATION_BYPASS_SECRET is empty. Set both in repo settings."
            exit 1
          fi
          Q="x-vercel-protection-bypass=${BYPASS}&x-vercel-set-bypass-cookie=samesitenone"
          {
            echo "urls<<URLS_EOF"
            echo "${PREVIEW_URL}?${Q}"
            echo "${PREVIEW_URL}/login?${Q}"
            echo "${PREVIEW_URL}/signup?${Q}"
            echo "${PREVIEW_URL}/pricing?${Q}"
            echo "URLS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './lighthouserc.js'
          urls: ${{ steps.urls.outputs.urls }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3

      - name: Comment Lighthouse scores
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const resultsPath = '.lighthouseci';

            if (fs.existsSync(resultsPath)) {
              const output = `#### Lighthouse Performance Report

              View full report in artifacts.

              Performance, Accessibility, Best Practices, and SEO scores are available in the CI artifacts.`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    # quality-checks removed from needs as part of Recommendation E dedup —
    # ci.yml's lint + typecheck jobs are the canonical source for those signals
    # and the PR Summary surfaces only pr-checks.yml results.
    needs: [pr-validation, test-coverage, build-preview, lighthouse]
    if: always() && github.event.pull_request.draft == false
    permissions:
      # Default GITHUB_TOKEN doesn't grant PR-write on fork PRs, so the
      # github.rest.issues.createComment call in the script below 403s with
      # "Resource not accessible by integration". Granting pull-requests:write
      # at the JOB level (not workflow level — keeps it minimal) lets the
      # bot comment on the PR. issues:write is also needed because PR
      # comments are technically issue comments under the hood.
      pull-requests: write
      issues: write
    steps:
      - name: Generate summary
        uses: actions/github-script@v7
        with:
          script: |
            const validationStatus = '${{ needs.pr-validation.result }}';
            const coverageStatus = '${{ needs.test-coverage.result }}';
            const buildStatus = '${{ needs.build-preview.result }}';

            const statusIcon = (status) => {
              if (status === 'success') return '✅';
              if (status === 'failure') return '❌';
              return '⏭️';
            };

            const output = `## PR Check Summary

            | Check | Status |
            |-------|--------|
            | PR Validation | ${statusIcon(validationStatus)} ${validationStatus} |
            | Test Coverage | ${statusIcon(coverageStatus)} ${coverageStatus} |
            | Build Preview | ${statusIcon(buildStatus)} ${buildStatus} |

            ${validationStatus === 'success' && coverageStatus === 'success' && buildStatus === 'success' ? '✅ All checks passed! Ready for review. (lint/typecheck signal: see CI Pipeline workflow.)' : '⚠️ Some checks failed. Please review the logs.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
