# Dependency Vulnerability Scanning Workflow
# Task: IFC-121 - Dependency Vulnerability Updates
# Created: 2025-12-29

name: Dependency Security Scan

on:
  schedule:
    # Run weekly on Monday at 3 AM UTC
    - cron: '0 3 * * 1'
  push:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '**/package.json'
  pull_request:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '**/package.json'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write
  # NOTE: issues: write is granted only on the aggregate-results job
  # (not workflow-wide) because only that one job's issue-create step
  # needs it (least privilege).

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Two-step pattern: capture the JSON for the report (best-effort), THEN
      # re-run as a strict gate that actually fails the job. Recommendation H0
      # of ci-cost-audit-2026-05-25.md — prerequisite for Recommendation H
      # (auto-merge Dependabot patch/minor). Without the strict gate, a
      # Dependabot bump that introduces a vulnerability would auto-merge.
      - name: Capture pnpm audit JSON (for report)
        id: audit
        run: |
          pnpm audit --json > audit-result.json 2>&1 || true
          # `.metadata.vulnerabilities` is a multi-key JSON object. Without -c
          # jq emits it pretty-printed across multiple lines, which violates
          # $GITHUB_OUTPUT's KEY=VALUE-on-one-line format and produces the
          # "Invalid format '  \"info\": 0,'" annotation. // {} guards against
          # an audit run that produced no output at all.
          echo "vulnerabilities=$(jq -c '.metadata.vulnerabilities // {}' audit-result.json 2>/dev/null || echo '{}')" >> $GITHUB_OUTPUT

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-results
          path: audit-result.json

      - name: Fail on high+ vulnerabilities (H0 gate)
        # Strict gate — no `|| true`, no `continue-on-error`. A vuln introduced
        # by a Dependabot bump must visibly fail this job so the auto-merge
        # workflow (PR8 of the dedup train) blocks the merge.
        run: pnpm audit --audit-level=high

  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        # Pinned to a specific commit SHA (verified GPG-signed merge from
        # snyk/actions main, 2026-05-05). `@master` is a moving target —
        # not acceptable for a strict H0 gate where a malicious or breaking
        # action update would be auto-trusted on the next CI run. Update
        # the SHA intentionally when needed (Dependabot can manage this if
        # added to .github/dependabot.yml). Per Copilot review on PR #174.
        uses: snyk/actions/node@9cf6ca713d71123d2d229cc3d7f145b96ea3c518
        # H0 gate — see NPM Audit job for rationale. If SNYK_TOKEN is missing,
        # the action exits non-zero and the workflow correctly reports an
        # unconfigured-gate failure (rather than silently passing).
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high --json-file-output=snyk-results.json

      - name: Upload Snyk results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-results
          path: snyk-results.json

  trivy-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results
          path: trivy-results.sarif

  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run OSV Scanner
        # H0 gate — see NPM Audit job for rationale.
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=json
            --output=osv-results.json

      - name: Upload OSV results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: osv-results
          path: osv-results.json

  aggregate-results:
    name: Aggregate & Report
    needs: [npm-audit, snyk-scan, trivy-scan, osv-scan]
    runs-on: ubuntu-latest
    # MUST run on failure: the strict H0 gates from PR #174 cause npm-audit /
    # snyk / osv to fail on real vulns. Without `if: always()`, GH Actions
    # skips this dependent job when any `needs:` fails — meaning the
    # consolidated report wouldn't be generated and the security team
    # wouldn't get the issue/PR notification at the moment they most need it.
    # Per Copilot review on PR #174.
    if: always()
    # Scoped privilege: only this job's Create-issue step needs to write
    # issues. Workflow-level permissions remain read/security-events/PR.
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: scan-results

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Generate consolidated report
        run: |
          cat > docs/security/dependency-scan-report.md << 'EOF'
          # Dependency Security Scan Report

          **Generated**: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Workflow Run**: ${{ github.run_id }}
          **Branch**: ${{ github.ref_name }}

          ## Summary

          | Scanner | Status | Critical | High | Medium | Low |
          |---------|--------|----------|------|--------|-----|
          | pnpm audit | ${{ needs.npm-audit.result }} | - | - | - | - |
          | Snyk | ${{ needs.snyk-scan.result }} | - | - | - | - |
          | Trivy | ${{ needs.trivy-scan.result }} | - | - | - | - |
          | OSV | ${{ needs.osv-scan.result }} | - | - | - | - |

          ## Remediation Actions

          See individual scanner results in workflow artifacts.

          ## SLA Compliance

          | Severity | SLA | Status |
          |----------|-----|--------|
          | Critical | 24 hours | Pending |
          | High | 7 days | Pending |
          | Medium | 30 days | Pending |
          | Low | 90 days | Pending |
          EOF

      - name: Check for critical vulnerabilities
        id: check-critical
        run: |
          # Check if any critical vulnerabilities exist
          CRITICAL_COUNT=0

          if [ -f scan-results/trivy-results/trivy-results.sarif ]; then
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' scan-results/trivy-results/trivy-results.sarif)
          fi

          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::Found $CRITICAL_COUNT critical vulnerabilities!"
          fi

      - name: Create issue for critical vulnerabilities
        # Skip on pull_request events because GITHUB_TOKEN is read-only
        # for PRs from forks (workflow-level permissions don't help) and
        # we don't want PR scans creating duplicate tracking issues.
        # Issues fire on push, schedule, and workflow_dispatch only.
        if: steps.check-critical.outputs.critical_count > 0 && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] Critical vulnerabilities found - ${new Date().toISOString().split('T')[0]}`,
              body: `## Critical Vulnerabilities Detected

              **Scan Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              **Count**: ${{ steps.check-critical.outputs.critical_count }} critical vulnerabilities

              ### Required Actions
              1. Review scan results in workflow artifacts
              2. Prioritize and remediate within 24-hour SLA
              3. Update vulnerability baseline once resolved

              /cc @security-team`,
              labels: ['security', 'critical', 'vulnerability']
            });

  auto-update:
    name: Auto-Update Dependencies
    needs: aggregate-results
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Update dependencies
        run: |
          pnpm update --latest
          pnpm audit fix --force || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
          commit-message: 'chore(deps): automated security updates'
          title: '[Security] Automated Dependency Updates'
          body: |
            ## Automated Security Updates

            This PR contains automated dependency updates from the weekly security scan.

            ### Changes
            - Updated vulnerable dependencies
            - Applied available security patches

            ### Verification
            - [ ] CI passes
            - [ ] No breaking changes
            - [ ] Security scan passes
          branch: automated/dependency-updates
          labels: dependencies,security,automated
