name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Bumped from 1.6.0 to 1.9.8 — terraform 1.6's embedded OpenPGP
  # keyring is too old to verify current hashicorp provider releases
  # (random v3.9, null v3.3, http v3.6, local v2.9). 1.6 init fails
  # with "openpgp: key expired". 1.9.x has updated trust roots and
  # remains under the original BSL-pre license.
  TF_VERSION: '1.9.8'
  TF_WORKING_DIR: 'infra/terraform'
  # HCP Terraform auth for the remote state backend (cloud{} in providers.tf).
  # Set the TF_API_TOKEN repo secret — see
  # docs/operations/runbooks/terraform-hcp-backend.md.
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        # The cloud{} backend forbids `-backend=false`; init connects to HCP and
        # selects a workspace (any env workspace is fine for validate-only).
        env:
          TF_WORKSPACE: intelliflow-crm-dev
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          output_format: sarif
          output_file_path: reports/checkov.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/checkov.sarif

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          soft_fail: true

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    # Auto-plan on PR/push is deferred until INFRA-TF-004 wires the provider
    # credentials (TF_VAR_* secrets) + per-env tfvars. Until then, run on demand
    # via workflow_dispatch (action=plan). State comes from the HCP cloud{}
    # backend in providers.tf — there is no S3/AWS backend anymore.
    if: github.event.inputs.action == 'plan'
    strategy:
      matrix:
        environment: [dev, staging]
    environment: ${{ matrix.environment }}
    env:
      TF_WORKSPACE: intelliflow-crm-${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        # cloud{} backend: TF_WORKSPACE (job env) selects the per-env workspace.
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN }}
          TF_VAR_railway_token: ${{ secrets.RAILWAY_TOKEN }}
          TF_VAR_supabase_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_environment: ${{ matrix.environment }}
        run: |
          terraform plan \
            -var-file="environments/${{ matrix.environment }}/terraform.tfvars" \
            -out=plan.tfplan \
            -no-color | tee plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: |
            ${{ env.TF_WORKING_DIR }}/plan.tfplan
            ${{ env.TF_WORKING_DIR }}/plan.txt

      - name: Comment PR
        uses: actions/github-script@v9
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const truncatedPlan = plan.length > 65000 ? plan.substring(0, 65000) + '\n\n... (truncated)' : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan - ${{ matrix.environment }}

            \`\`\`terraform
            ${truncatedPlan}
            \`\`\`

            <details>
            <summary>Show full plan</summary>

            Download the full plan artifact from the workflow run.
            </details>
            `
            });

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    # Apply is deferred to INFRA-TF-004 (needs TF_VAR_* creds + the plan
    # artifact from the gated plan job). Runs only via workflow_dispatch
    # (action=apply); no auto-apply on push to main yet.
    if: github.event.inputs.action == 'apply'
    strategy:
      matrix:
        environment: [dev, staging]
    environment: ${{ matrix.environment }}
    env:
      TF_WORKSPACE: intelliflow-crm-${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN }}
          TF_VAR_railway_token: ${{ secrets.RAILWAY_TOKEN }}
          TF_VAR_supabase_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply -auto-approve plan.tfplan

      - name: Terraform Output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform output -json > outputs.json
          cat outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v7
        with:
          name: terraform-outputs-${{ matrix.environment }}
          path: ${{ env.TF_WORKING_DIR }}/outputs.json

  production-plan:
    name: Production Plan
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    # Deferred to INFRA-TF-004 (needs TF_VAR_*_PROD creds + tfvars). Runs only
    # via workflow_dispatch (environment=production, action=plan).
    if: github.event.inputs.environment == 'production' && github.event.inputs.action == 'plan'
    environment: production-plan
    env:
      TF_WORKSPACE: intelliflow-crm-production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}
          TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN_PROD }}
          TF_VAR_railway_token: ${{ secrets.RAILWAY_TOKEN_PROD }}
          TF_VAR_supabase_db_password: ${{ secrets.DB_PASSWORD_PROD }}
          TF_VAR_environment: production
        run: |
          terraform plan \
            -var-file="environments/production/terraform.tfvars" \
            -out=plan.tfplan \
            -no-color | tee plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-production
          path: |
            ${{ env.TF_WORKING_DIR }}/plan.tfplan
            ${{ env.TF_WORKING_DIR }}/plan.txt

  production-apply:
    name: Production Apply
    runs-on: ubuntu-latest
    needs: production-plan
    if: github.event.inputs.action == 'apply' && github.event.inputs.environment == 'production'
    environment: production
    env:
      TF_WORKSPACE: intelliflow-crm-production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan-production
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}
          TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN_PROD }}
          TF_VAR_railway_token: ${{ secrets.RAILWAY_TOKEN_PROD }}
          TF_VAR_supabase_db_password: ${{ secrets.DB_PASSWORD_PROD }}
        run: terraform apply -auto-approve plan.tfplan

      - name: Terraform Output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output -json > outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v7
        with:
          name: terraform-outputs-production
          path: ${{ env.TF_WORKING_DIR }}/outputs.json
