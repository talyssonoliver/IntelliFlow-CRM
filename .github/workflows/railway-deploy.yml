name: Railway Deploy

# Deploys API + ai-worker services to Railway via the Railway CLI.
#
# Two deploy paths exist for this repo, and both rely on RAILWAY_TOKEN:
#   1. Terraform (.github/workflows/terraform.yml) provisions the project,
#      services, env vars, and points each service at a GHCR image.
#      Re-running build-images.yml pushes a new image -> Railway auto-pulls.
#   2. THIS workflow (railway-deploy.yml) does a direct `railway up` for
#      hot-fixes and matrixed dev/staging deploys without going through GHCR.
#
# Trigger paths:
#   - workflow_dispatch (manual; choose env + service)
#   - workflow_run after build-images.yml succeeds on main (auto-redeploy)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Railway environment to deploy
        required: true
        type: choice
        options: [dev, staging, production]
        default: dev
      service:
        description: Service to deploy (or 'all')
        required: true
        type: choice
        options: [all, api, ai-worker]
        default: all
  workflow_run:
    workflows: [Build & Push Images]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: railway-deploy-${{ github.event.inputs.environment || 'dev' }}
  # cancel-in-progress: true — per audit doc §10-J. When Build & Push
  # Images on main triggers Railway Deploy via workflow_run AND a newer
  # build completes before the older deploy finishes, the older deploy
  # is now superseded — let it cancel instead of stacking 9 retries in
  # the queue (the pattern that produced 9 chronic Railway Deploy
  # failures back-to-back, documented in the audit's run-failure
  # cluster). The `group` already scopes to environment, so we don't
  # accidentally cancel a dev deploy when staging starts.
  cancel-in-progress: true

env:
  # Skip the workflow_run path if the upstream build failed
  UPSTREAM_OK: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

  # NOTE: RAILWAY_TOKEN / RAILWAY_API_TOKEN are intentionally NOT at
  # workflow scope. They're resolved per-job inside the `environment:`
  # block so GitHub Environment-scoped secrets pick up env-specific
  # values (e.g., RAILWAY_TOKEN_PROD for production, matching the
  # convention already used by terraform.yml). At workflow scope only
  # repo-level secrets would resolve, defeating the env-scoped model.

jobs:
  preflight:
    name: Preflight — token + env
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    # Repo-level token presence check only — environment-scoped tokens are
    # validated inside the deploy job where the env: binding applies.
    #
    # CRITICAL: do NOT expose the raw secret value via this job's env.
    # GitHub's secret-masking heuristic treats any subsequent step output
    # whose value contains a substring of a registered secret as
    # potentially-leaky and silently drops it (`Skip output 'X' since it
    # may contain secret`). The Resolve step's hard-coded
    # services=["api","ai-worker"] output kept tripping that path, the
    # `services` output was wiped, and the downstream deploy matrix never
    # expanded — failing the whole workflow before any job ran. Using
    # presence-booleans keeps the raw secret out of this job's env so
    # masking can't fire on unrelated outputs.
    env:
      HAS_RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN != '' && 'yes' || 'no' }}
      HAS_RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN != '' && 'yes' || 'no' }}
    steps:
      - name: Validate Railway token secret is present
        run: |
          if [ "${HAS_RAILWAY_TOKEN}" != "yes" ] && [ "${HAS_RAILWAY_API_TOKEN}" != "yes" ]; then
            # NOTE: this preflight job intentionally has no `environment:`
            # binding so it can validate the repo-level token before the
            # deploy job's environment context is resolved. Environment-
            # scoped secrets are NOT visible here — they're consumed by
            # the deploy job below. Set a repo-level secret to satisfy
            # this check; per-environment overrides apply at deploy time.
            echo "::error::Neither RAILWAY_TOKEN nor RAILWAY_API_TOKEN repo-level secret is configured."
            echo "::error::Set at least one repo-level value in Settings -> Secrets and variables -> Actions. Per-environment secrets are valid for deploy, but this preflight runs without an environment context and only sees repo-level secrets."
            exit 1
          fi
          echo "Railway auth present (RAILWAY_TOKEN=${HAS_RAILWAY_TOKEN}, RAILWAY_API_TOKEN=${HAS_RAILWAY_API_TOKEN})"

      - name: Resolve target environment
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV_NAME="${{ inputs.environment }}"
          else
            # Auto-deploy on successful main build defaults to dev for safety
            ENV_NAME="dev"
          fi
          echo "environment=${ENV_NAME}" >> "$GITHUB_OUTPUT"
          # NOTE: the service list is intentionally NOT emitted as a job
          # output. GitHub masks any registered secret value run-wide; here
          # the literal `ai-worker` collides with a masked value, so an
          # `services=["api","ai-worker"]` step output gets `ai***worker`'d
          # and GitHub then refuses to pass it across the job boundary
          # ("Skip output 'services' since it may contain secret"). The
          # downstream `fromJSON(needs.preflight.outputs.services)` matrix
          # then resolved to empty and the deploy job never spawned — the
          # chronic Railway Deploy failure. The deploy job below now uses a
          # literal matrix (no cross-job output) and gates each service with
          # a step-level `if`, which is immune to output masking.

  deploy:
    name: Deploy ${{ matrix.service }} -> ${{ needs.preflight.outputs.environment }}
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ needs.preflight.outputs.environment }}
    # Job-scoped env so GitHub Environment-scoped secrets resolve. Set
    # RAILWAY_TOKEN per Environment (dev / staging / production) in
    # Settings -> Environments -> <name> -> Secrets. Falls back to
    # repo-level RAILWAY_TOKEN if no env-scoped value is set.
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN || secrets.RAILWAY_TOKEN }}
    strategy:
      fail-fast: false
      # Literal matrix — NOT derived from a job output. See the preflight
      # "Resolve target environment" step for why a `services` output can't
      # be passed across the job boundary (run-wide secret masking corrupts
      # it). Every step that actually touches Railway is gated by SHOULD_RUN
      # so a workflow_dispatch targeting a single service skips the other.
      matrix:
        service: [api, ai-worker]
    steps:
      - name: Decide whether this matrix service should deploy
        id: gate
        # workflow_run (auto on main) always deploys both. workflow_dispatch
        # honours the chosen `inputs.service` ('all' or a single service).
        # `inputs` is evaluated, not logged, so masking of `ai-worker` does
        # not affect this comparison.
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] \
             || [ "${{ inputs.service }}" = "all" ] \
             || [ "${{ inputs.service }}" = "${{ matrix.service }}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.service }} (workflow_dispatch targeted '${{ inputs.service }}')."
          fi

      - name: Checkout
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Install Railway CLI
        if: steps.gate.outputs.should_run == 'true'
        # Deterministic, pinned install via npm — NOT `curl … | sh`. The
        # upstream install.sh requires bash; piped to GitHub's default `sh`
        # (dash) it dies with `Bad substitution` and never lands the binary,
        # so the next step hit `railway: command not found`. The npm package
        # is the officially-published CLI; pinned to an EXACT version for
        # deterministic CI (bump deliberately, not via a floating range), and
        # npm's global bin is already on PATH (no manual GITHUB_PATH wiring).
        run: npm install -g @railway/cli@4.66.0

      - name: Show Railway CLI version
        if: steps.gate.outputs.should_run == 'true'
        run: railway --version

      - name: Link to Railway project
        if: steps.gate.outputs.should_run == 'true'
        env:
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "::error::Missing repo/env variable RAILWAY_PROJECT_ID. Set it under Settings -> Environments -> ${{ needs.preflight.outputs.environment }} (Variables tab)."
            exit 1
          fi
          railway link --project "$RAILWAY_PROJECT_ID" --environment "${{ needs.preflight.outputs.environment }}"

      - name: Deploy ${{ matrix.service }}
        if: steps.gate.outputs.should_run == 'true'
        # `cd apps/<svc>` so Railway picks up the per-service railway.json
        # via the CLI's working-directory lookup (otherwise it falls back
        # to repo-root defaults, which would deploy with the wrong
        # builder/config).
        run: |
          case "${{ matrix.service }}" in
            api)
              cd apps/api
              railway up --service api --detach --ci
              ;;
            ai-worker)
              cd apps/ai-worker
              railway up --service ai-worker --detach --ci
              ;;
            *)
              echo "::error::Unknown service: ${{ matrix.service }}"
              exit 1
              ;;
          esac

      - name: Capture deployment status
        if: always() && steps.gate.outputs.should_run == 'true'
        run: |
          echo "## Railway deploy — ${{ matrix.service }} (${{ needs.preflight.outputs.environment }})" >> "$GITHUB_STEP_SUMMARY"
          railway status --json | jq '.' >> "$GITHUB_STEP_SUMMARY" || true
