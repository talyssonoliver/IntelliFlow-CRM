name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          fetch-depth: '0'
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          build-libs: 'true'

      - name: Type check
        run: pnpm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          build-libs: 'true'

      - name: Run tests
        run: pnpm run test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./artifacts/coverage/lcov.info
          fail_ci_if_error: false

  # ==========================================
  # IFC-131: Architecture Boundary Enforcement
  # ==========================================
  architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Install architecture test dependencies
        run: cd tests/architecture && pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Run architecture boundary tests
        run: cd tests/architecture && pnpm test
        id: arch-tests

      - name: Architecture boundary check summary
        if: always()
        run: |
          echo "## Architecture Boundary Enforcement" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Hexagonal Architecture Rules (IFC-131)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Can Depend On | Cannot Depend On |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------------|------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | (none) | Application, Adapters, Infrastructure |" >> $GITHUB_STEP_SUMMARY
          echo "| Application | Domain | Adapters, Infrastructure |" >> $GITHUB_STEP_SUMMARY
          echo "| Adapters | Domain, Application | (none - outer layer) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.arch-tests.outcome }}" == "success" ]; then
            echo ":white_check_mark: **All architecture boundary tests passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **Architecture boundary violations detected!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the test output for details on which imports violate hexagonal architecture rules." >> $GITHUB_STEP_SUMMARY
          fi

  # ==========================================
  # Integration Tests with Database Services
  # ==========================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        # pgvector image so the baseline migration's `CREATE EXTENSION vector`
        # works during integration test setup. Vanilla postgres:15-alpine
        # doesn't ship pgvector binaries.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intelliflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/intelliflow_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          build-libs: 'true'

      - name: Bootstrap Supabase schemas + roles
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d intelliflow_test -v ON_ERROR_STOP=1 <<'SQL'
            CREATE SCHEMA IF NOT EXISTS extensions;
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
                CREATE ROLE anon NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
                CREATE ROLE authenticated NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
                CREATE ROLE service_role NOLOGIN BYPASSRLS;
              END IF;
            END
            $$;
            GRANT USAGE ON SCHEMA extensions TO postgres, anon, authenticated, service_role;
          SQL

      - name: Setup database
        run: |
          pnpm --filter @intelliflow/db db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/intelliflow_test

      - name: Run integration tests
        run: pnpm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/intelliflow_test
          REDIS_URL: redis://localhost:6379

      - name: Upload integration test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: integration-test-report
          path: |
            artifacts/coverage/
            artifacts/reports/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, architecture, integration]
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # PG-195: enforce glyph-audit coverage before the production build so
      # a new unlisted icon cannot ship as tofu (also enforced on PRs via
      # pr-checks.yml > Quality Checks).
      - name: Audit Material Symbols glyph coverage
        run: pnpm --filter @intelliflow/web audit:material-symbols

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          # All module-load guards must be satisfied or `next build` fails
          # at page-data collection. See pr-checks.yml > Build Preview for
          # the full rationale; mirror that env block here.
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-build-stub-key-not-used-at-runtime' }}
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            apps/*/dist
            apps/*/.next
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  plan-lint:
    name: Sprint Plan Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/plan/pyproject.toml

      - name: Install plan-lint dependencies
        run: |
          cd tools/plan
          pip install -e ".[dev]"

      - name: Run plan linter (Sprint 0)
        run: |
          cd tools/plan
          python -m src.adapters.cli lint --sprint 0 --verbose

      - name: Run plan lint tests
        run: |
          cd tools/plan
          python -m pytest tests/ -v --tb=short

      - name: Upload lint reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: plan-lint-report
          path: |
            apps/project-tracker/docs/metrics/review-queue.json
            artifacts/reports/plan-lint-report.json
          retention-days: 30

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # E2E has been chronically flaky on main since the monorepo grew (Next.js
    # production build inside playwright.config.ts webServer.command exceeds
    # the wall-clock budget). E2E is NOT in branch-protection required checks
    # so this doesn't gate PRs; mark continue-on-error so the failure stops
    # turning the whole CI Pipeline workflow red. Tracked at GH issue #95.
    continue-on-error: true
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload E2E results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
