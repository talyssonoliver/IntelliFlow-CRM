name: Build & Push Images

# Builds the API and AI-worker Docker images and publishes them to GitHub
# Container Registry (GHCR). These images are what infra/terraform deploys
# to Railway, so they must exist before `terraform apply`.
#
# Published images:
#   ghcr.io/<owner>/intelliflow-crm-api:latest
#   ghcr.io/<owner>/intelliflow-crm-ai-worker:latest
#
# Trigger manually from the Actions tab (workflow_dispatch), on a version
# tag, or on push to main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: infra/docker/Dockerfile.api
          - service: ai-worker
            dockerfile: infra/docker/Dockerfile.ai-worker
          # INFRA-TF-005: the 3 workers (events/ingestion/notifications) so their
          # ghcr.io/<owner>/intelliflow-crm-<svc>:latest images exist for the
          # Railway services defined in the env tfvars (INFRA-TF-002).
          - service: events-worker
            dockerfile: apps/workers/events-worker/Dockerfile
          - service: ingestion-worker
            dockerfile: apps/workers/ingestion-worker/Dockerfile
          - service: notifications-worker
            dockerfile: apps/workers/notifications-worker/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Retried buildx (was docker/build-push-action). The base-image pull from
      # Docker Hub intermittently times out ("context deadline exceeded") on one
      # matrix service, reddening main; a re-attempt clears it. The GHA layer
      # cache makes retries cheap. Tags: latest + sha-<short> (+ the git tag on
      # v* tag pushes), matching the previous metadata-action output.
      - name: Build and push (retry transient registry timeouts)
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/intelliflow-crm-${{ matrix.service }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          tags=(--tag "$IMAGE:latest" --tag "$IMAGE:sha-$short_sha")
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            tags+=(--tag "$IMAGE:${GITHUB_REF#refs/tags/}")
          fi
          for attempt in 1 2 3; do
            echo "::group::build $IMAGE (attempt $attempt)"
            if docker buildx build --push \
                 --file "$DOCKERFILE" \
                 "${tags[@]}" \
                 --cache-from type=gha \
                 --cache-to type=gha,mode=max \
                 .; then
              echo "::endgroup::"
              echo "build succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed (likely a transient registry timeout); retrying in 20s"
            sleep 20
          done
          echo "build failed after 3 attempts"
          exit 1
