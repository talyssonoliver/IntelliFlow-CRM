name: System Audit (Tier 1 + Tier 2)

on:
  pull_request:
    branches: [main, develop]
    # System audit runs the Tier 1+2 audit + library re-build. None of
    # the audit modules read .md files or sprint CSV splits, and this
    # workflow's `system-audit` context is NOT in branch protection's
    # required list — safe to skip on doc-only churn. See audit §10-B.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'apps/project-tracker/docs/metrics/_global/Sprint_plan_*.csv'
  workflow_dispatch: {}

concurrency:
  group: system-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_CACHE_DIR: .turbo

jobs:
  system-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip entirely for Dependabot PRs. system-audit is NOT a required status check
    # (verified with `gh api repos/.../branches/main/protection`), so skipping it
    # for bot PRs does not block merges. ci.yml already runs typecheck/lint/test/build
    # against the bumped lockfile, which is the only signal Dependabot needs.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache SonarQube
        uses: actions/cache@v5
        with:
          path: .sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('sonar-project.properties') }}
          restore-keys: |
            ${{ runner.os }}-sonar-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyyaml pytest semgrep

      - name: Run audit tool tests
        run: python -m pytest tools/audit/tests -q

      - name: Compute PR base ref
        run: echo "BASE_REF=origin/${{ github.base_ref }}" >> $GITHUB_ENV

      - name: Protect remote cache on forks
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: echo "TURBO_REMOTE_CACHE_READ_ONLY=true" >> $GITHUB_ENV

      - name: Build library packages
        # Mirror ci.yml typecheck/test job pattern: build all library packages
        # (domain, db, adapters, …) before running the audit so that workspace
        # packages that depend on them can resolve their dist/ type declarations.
        # Without this step turbo's `dependsOn: ["^build"]` still runs the full
        # build graph — but only within the affected-scope filter, which may
        # exclude un-changed library packages even though their dist/ is stale.
        run: pnpm exec turbo run build --filter=!@intelliflow/web --filter=!@intelliflow/api --filter=!@intelliflow/project-tracker --filter=!@intelliflow/workers
        env:
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-audit-stub-key-not-used-at-runtime' }}
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}

      - name: Run PR audit (Tier 1 + Tier 2, affected scope)
        env:
          # The audit invokes `turbo run build` / `test:coverage`, which
          # compile @intelliflow/web. That build needs every module-load env
          # guard satisfied (Prisma encryption key, AI audit signing, Supabase
          # config). Use repo secrets when available; fall back to RFC-shaped
          # stubs only for forked PRs without secret access. NEVER use the
          # stubs at runtime.
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-audit-stub-key-not-used-at-runtime' }}
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
        run: |
          RUN_ID="gha-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          python tools/audit/run_audit.py --mode pr --run-id "$RUN_ID" --base-ref "$BASE_REF" --resume --concurrency 2

      - name: Generate Sprint 0 snapshot + reports
        if: always()
        run: |
          python tools/audit/status_snapshot.py
          python tools/audit/sprint0_audit.py --run-id "$RUN_ID"

      - name: Upload audit bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: system-audit-${{ github.run_id }}
          path: |
            artifacts/reports/system-audit/${{ env.RUN_ID }}
            artifacts/reports/affected
            artifacts/reports/status-snapshot.json
            artifacts/reports/completed-task-ids.txt
            artifacts/reports/sprint0-audit.md
            artifacts/reports/review-queue.json
            artifacts/reports/review-queue.md
            artifacts/debt-ledger.md
            artifacts/debt-ledger.jsonl
          retention-days: 14
