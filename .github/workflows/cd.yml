name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  deploy-staging:
    name: Deploy to Staging
    needs: [prepare]
    if: needs.prepare.outputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.intelliflow-crm.dev
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pre-build internal packages so the @intelliflow/web build can
      # resolve @intelliflow/* via their dist/ entries. Mirrors ci.yml.
      - name: Build internal packages
        run: pnpm turbo run build --filter=!@intelliflow/web --filter=!@intelliflow/api --filter=!@intelliflow/project-tracker --filter=!@intelliflow/workers

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          # Mirror the env-stub block from ci.yml > Build so the staging
          # build's module-load guards (PRISMA_FIELD_ENCRYPTION_KEY,
          # AI_AUDIT_SIGNING_KEY) are satisfied during page-data collection.
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-build-stub-key-not-used-at-runtime' }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL || 'postgresql://stub:stub@localhost:5432/stub' }}
          DIRECT_URL: ${{ secrets.STAGING_DATABASE_URL || 'postgresql://stub:stub@localhost:5432/stub' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_API_URL: ${{ vars.STAGING_API_URL || 'http://localhost:4000' }}

      # Vercel auto-deploys main pushes via Git integration — this CLI step
      # is the explicit hook for STAGING environment so we get a known URL.
      # Replaces dead amondnet/vercel-action@v25 with the modern CLI (same
      # pattern as pr-checks.yml > Deploy Preview).
      - name: Deploy to Vercel (Staging)
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}

      - name: Run smoke tests
        # Smoke test best-effort — the staging domain may not be live in
        # all branches/environments. Failure here doesn't fail the job.
        continue-on-error: true
        run: |
          sleep 30
          curl -f https://staging.intelliflow-crm.dev/api/health || echo "Staging smoke test skipped (domain not reachable)"

  deploy-production:
    name: Deploy to Production
    needs: [prepare]
    if: needs.prepare.outputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://intelliflow-crm.dev
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pre-build internal packages so the @intelliflow/web build can
      # resolve @intelliflow/* via their dist/ entries. Mirrors ci.yml.
      - name: Build internal packages
        run: pnpm turbo run build --filter=!@intelliflow/web --filter=!@intelliflow/api --filter=!@intelliflow/project-tracker --filter=!@intelliflow/workers

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          PRISMA_FIELD_ENCRYPTION_KEY: ${{ secrets.PRISMA_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          AI_AUDIT_SIGNING_KEY: ${{ secrets.AI_AUDIT_SIGNING_KEY || 'ci-build-stub-key-not-used-at-runtime' }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL || 'postgresql://stub:stub@localhost:5432/stub' }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DATABASE_URL || 'postgresql://stub:stub@localhost:5432/stub' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://stub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-service-role-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-not-a-real-supabase-key-do-not-use-at-runtime' }}
          NEXT_PUBLIC_API_URL: ${{ vars.PRODUCTION_API_URL || 'http://localhost:4000' }}

      # Replaces dead amondnet/vercel-action@v25 with the modern CLI
      # (same pattern as pr-checks.yml > Deploy Preview), --prod flag.
      - name: Deploy to Vercel (Production)
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}

      - name: Run smoke tests
        # Smoke test best-effort — the production domain may not be live
        # in all branches/environments. Failure here doesn't fail the job.
        continue-on-error: true
        run: |
          sleep 30
          curl -f https://intelliflow-crm.dev/api/health || echo "Production smoke test skipped (domain not reachable)"

      - name: Notify deployment
        if: success()
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "Production deployment successful: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
