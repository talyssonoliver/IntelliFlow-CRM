name: Migration ETL Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'scripts/migration/**'
      - 'packages/db/prisma/schema.prisma'
  pull_request:
    paths:
      - 'scripts/migration/**'
      - 'packages/db/prisma/schema.prisma'
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Legacy database connection URL'
        required: false
        type: string
      target_url:
        description: 'Target database connection URL'
        required: false
        type: string
      dry_run:
        description: 'Run in dry-run mode (no data changes)'
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  # Job 1: Validate transformation rules and schema
  validate:
    name: Validate Transformation Rules
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # db:generate, NOT `prisma generate` — pnpm has no such script, so the
        # old form errored ERR_PNPM_RECURSIVE_RUN_NO_SCRIPT on every run.
        run: pnpm --filter @intelliflow/db db:generate

      - name: Build @intelliflow/db
        # The migration unit tests import @intelliflow/db, whose package.json
        # exports resolve to ./dist (built by tsup). Install + db:generate do NOT
        # build it, so vitest failed: "Failed to resolve entry for package
        # @intelliflow/db". Build it (+ deps via turbo) so the exports resolve.
        run: pnpm exec turbo run build --filter=@intelliflow/db

      - name: Validate transformation rules
        run: |
          echo "Validating delta-sync.ts transformation rules..."
          pnpm exec tsx scripts/migration/delta-sync.ts --validate

      - name: Run migration unit tests
        run: |
          pnpm exec vitest run scripts/migration/__tests__/delta-sync.test.ts
          pnpm exec vitest run scripts/migration/__tests__/reconciliation.test.ts
          pnpm exec vitest run scripts/migration/__tests__/validate-target.test.ts

      - name: Validate Prisma schema
        run: |
          cd packages/db
          npx prisma format
          echo "Schema validation passed"

      - name: Check governance columns (ADR-007)
        # Single source of truth — the same gate runs in pre-ship + PR CI so a
        # missing governance column can't rot red only on main (see the script).
        run: node scripts/check-governance-schema.mjs

  # Job 2: Execute dry-run migration
  dry-run:
    name: Dry-Run Migration
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: intelliflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # db:generate, NOT `prisma generate` — pnpm has no such script, so the
        # old form errored ERR_PNPM_RECURSIVE_RUN_NO_SCRIPT on every run.
        run: pnpm --filter @intelliflow/db db:generate

      - name: Bootstrap Supabase schemas + roles
        run: |
          PGPASSWORD=test psql -h localhost -U test -d intelliflow_test -v ON_ERROR_STOP=1 <<'SQL'
            CREATE SCHEMA IF NOT EXISTS extensions;
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
                CREATE ROLE anon NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
                CREATE ROLE authenticated NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
                CREATE ROLE service_role NOLOGIN BYPASSRLS;
              END IF;
              -- Supabase's superuser-equivalent. The CI Postgres superuser is `test`,
              -- so `postgres` must exist for the baseline migration's
              -- `GRANT ... TO postgres` (and any OWNER/RLS refs) to apply.
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'postgres') THEN
                CREATE ROLE postgres SUPERUSER;
              END IF;
            END
            $$;
            GRANT USAGE ON SCHEMA extensions TO test, anon, authenticated, service_role;
          SQL

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/intelliflow_test
        run: |
          # db:migrate / db:seed scripts — NOT `prisma migrate deploy` / `prisma
          # db seed`, which pnpm reads as (nonexistent) script names.
          pnpm --filter @intelliflow/db db:migrate
          pnpm --filter @intelliflow/db db:seed || echo "Seeding skipped or failed"

      - name: Run delta-sync dry-run
        env:
          DATABASE_URL: ${{ inputs.target_url || 'postgresql://test:test@localhost:5432/intelliflow_test' }}
          LEGACY_DB_URL: ${{ inputs.source_url || '' }}
        run: |
          echo "Running delta-sync in dry-run mode..."
          pnpm exec tsx scripts/migration/delta-sync.ts \
            --target "$DATABASE_URL" \
            --since "2020-01-01T00:00:00Z" \
            --dry-run

      - name: Build library packages
        # The integration tests below import @intelliflow/db, which resolves to its
        # built ./dist entry (package.json main/module/exports). The full CI Pipeline
        # builds libs first; this job must too, or vite fails to resolve the entry
        # ("Failed to resolve entry for package @intelliflow/db"). turbo builds
        # @intelliflow/db + its workspace deps (dependsOn ^build).
        run: pnpm exec turbo run build --filter=@intelliflow/db

      - name: Run integration tests
        run: |
          pnpm exec vitest run scripts/migration/__tests__/migration.integration.test.ts
          pnpm exec vitest run scripts/migration/__tests__/checkpoint.integration.test.ts

  # Job 3: Generate reconciliation report
  reconciliation:
    name: Reconciliation Report
    runs-on: ubuntu-latest
    needs: dry-run
    # IFC-070 data-migration reconciliation only has meaning for an actual
    # legacy->new migration (source_url provided). On routine schema pushes/PRs the
    # test DB is freshly migrated + empty, so reconciliation.ts FAILs on 0 rows.
    # Gate it to explicit data-migration runs; target-validation follows via needs.
    if: ${{ github.event.inputs.source_url != '' }}
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: intelliflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # db:generate, NOT `prisma generate` — pnpm has no such script, so the
        # old form errored ERR_PNPM_RECURSIVE_RUN_NO_SCRIPT on every run.
        run: pnpm --filter @intelliflow/db db:generate

      - name: Bootstrap Supabase schemas + roles
        run: |
          PGPASSWORD=test psql -h localhost -U test -d intelliflow_test -v ON_ERROR_STOP=1 <<'SQL'
            CREATE SCHEMA IF NOT EXISTS extensions;
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
                CREATE ROLE anon NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
                CREATE ROLE authenticated NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
                CREATE ROLE service_role NOLOGIN BYPASSRLS;
              END IF;
              -- Supabase's superuser-equivalent. The CI Postgres superuser is `test`,
              -- so `postgres` must exist for the baseline migration's
              -- `GRANT ... TO postgres` (and any OWNER/RLS refs) to apply.
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'postgres') THEN
                CREATE ROLE postgres SUPERUSER;
              END IF;
            END
            $$;
            GRANT USAGE ON SCHEMA extensions TO test, anon, authenticated, service_role;
          SQL

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/intelliflow_test
        run: |
          pnpm --filter @intelliflow/db db:migrate

      - name: Generate reconciliation report
        env:
          DATABASE_URL: ${{ inputs.target_url || 'postgresql://test:test@localhost:5432/intelliflow_test' }}
        run: |
          echo "Running reconciliation..."
          mkdir -p artifacts/reports
          pnpm exec tsx scripts/migration/reconciliation.ts \
            --target "$DATABASE_URL" \
            --output artifacts/reports/data-validation-report.csv

      - name: Verify reconciliation report
        run: |
          if [ -f artifacts/reports/data-validation-report.csv ]; then
            echo "✓ data-validation-report.csv generated"
            head -20 artifacts/reports/data-validation-report.csv
          else
            echo "✗ data-validation-report.csv not found"
            exit 1
          fi

      - name: Upload reconciliation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reconciliation-report-${{ github.sha }}
          path: artifacts/reports/data-validation-report.csv
          retention-days: 30

  # Job 4: Target database validation
  target-validation:
    name: Target Validation
    runs-on: ubuntu-latest
    needs: reconciliation
    # Data-migration validation — same gating as reconciliation (only for an actual
    # legacy->new migration). Skips on routine schema pushes/PRs.
    if: ${{ github.event.inputs.source_url != '' }}
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: intelliflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # db:generate, NOT `prisma generate` — pnpm has no such script, so the
        # old form errored ERR_PNPM_RECURSIVE_RUN_NO_SCRIPT on every run.
        run: pnpm --filter @intelliflow/db db:generate

      - name: Bootstrap Supabase schemas + roles
        run: |
          PGPASSWORD=test psql -h localhost -U test -d intelliflow_test -v ON_ERROR_STOP=1 <<'SQL'
            CREATE SCHEMA IF NOT EXISTS extensions;
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
                CREATE ROLE anon NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
                CREATE ROLE authenticated NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
                CREATE ROLE service_role NOLOGIN BYPASSRLS;
              END IF;
              -- Supabase's superuser-equivalent. The CI Postgres superuser is `test`,
              -- so `postgres` must exist for the baseline migration's
              -- `GRANT ... TO postgres` (and any OWNER/RLS refs) to apply.
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'postgres') THEN
                CREATE ROLE postgres SUPERUSER;
              END IF;
            END
            $$;
            GRANT USAGE ON SCHEMA extensions TO test, anon, authenticated, service_role;
          SQL

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/intelliflow_test
        run: |
          pnpm --filter @intelliflow/db db:migrate

      - name: Run target validation
        env:
          DATABASE_URL: ${{ inputs.target_url || 'postgresql://test:test@localhost:5432/intelliflow_test' }}
        run: |
          echo "Running target validation..."
          mkdir -p artifacts/misc
          pnpm exec tsx scripts/migration/validate-target.ts \
            --database "$DATABASE_URL" \
            --output artifacts/reports/migration-log.txt

      - name: Verify migration log
        run: |
          if [ -f artifacts/reports/migration-log.txt ]; then
            echo "✓ migration-log.txt generated"
            head -50 artifacts/reports/migration-log.txt
          else
            echo "✗ migration-log.txt not found"
            exit 1
          fi

      - name: Build library packages
        # The rollback integration test imports @intelliflow/db (resolves to ./dist);
        # build the lib first or vite fails to resolve the entry (same as the dry-run job).
        run: pnpm exec turbo run build --filter=@intelliflow/db

      - name: Run rollback procedure tests
        run: pnpm exec vitest run scripts/migration/__tests__/rollback.integration.test.ts

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: migration-validation-${{ github.sha }}
          path: |
            artifacts/reports/data-validation-report.csv
            artifacts/reports/migration-log.txt
          retention-days: 30

  # Notification on failure
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate, dry-run, reconciliation, target-validation]
    if: failure()

    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \"🚨 Migration pipeline failed on ${GITHUB_REF_NAME}\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Migration Pipeline Failed*\nBranch: \`${GITHUB_REF_NAME}\`\nCommit: \`${GITHUB_SHA:0:8}\`\nRun: <${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View Details>\"
                  }
                }
              ]
            }"
