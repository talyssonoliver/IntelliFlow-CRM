# Secret scanning — must NEVER be skipped on any change.
#
# Split out from security.yml so that the cost-saving `paths-ignore` on
# the heavy scanners (Trivy, OWASP Dependency-Check, CodeQL, npm-audit)
# does not also disable secret detection on doc-only PRs. Secrets can
# absolutely live in Markdown — example .env snippets, troubleshooting
# screenshots' alt text with leaked tokens, ADR drafts referencing real
# project IDs, etc. The .gitleaks.toml in this repo even allowlists
# `docs/setup/*.md` paths explicitly, which only makes sense if the
# scanner is running against docs in the first place.
#
# Recommendation B follow-up to address Copilot review on PR #169.

name: Secret Scanning

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: Secret Scanning with GitLeaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Upload Gitleaks results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30
