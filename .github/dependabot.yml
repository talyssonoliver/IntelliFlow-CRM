# Dependabot configuration for IntelliFlow CRM
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # npm / pnpm workspace
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'security'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      # Storybook MUST move as a unit — every @storybook/* and the meta
      # 'storybook' package need to be pinned to the same major or the
      # ecosystem breaks at runtime (component renderers ↔ core ↔ addon
      # API mismatch). Group all of them, including majors, into one PR.
      # Without this group, dependabot splits storybook into 6+ separate
      # PRs (see PR #132 / #133 / parts of #130) which can never all
      # land safely. Named groups with 'patterns' override the
      # type-based groups below.
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      # Group non-major updates to reduce PR noise; majors still land individually
      production-minor-and-patch:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      development-minor-and-patch:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # Major upgrades of framework pins are coordinated manually
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']
      - dependency-name: '@prisma/client'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
    groups:
      actions-minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # amondnet/vercel-action is unmaintained and was replaced repo-wide
      # by the modern `vercel` CLI (see pr-checks.yml, cd.yml). Dependabot
      # kept proposing upgrades (PR #121 was the latest). Ignore so this
      # never reopens.
      - dependency-name: 'amondnet/vercel-action'
