# Dependabot configuration for IntelliFlow CRM
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # npm / pnpm workspace
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'security'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      # Storybook MUST move as a unit — every @storybook/* and the meta
      # 'storybook' package need to be pinned to the same major or the
      # ecosystem breaks at runtime (component renderers ↔ core ↔ addon
      # API mismatch). Group all of them, including majors, into one PR.
      # Without this group, dependabot splits storybook into 6+ separate
      # PRs (see PR #132 / #133 / parts of #130) which can never all
      # land safely. Named groups with 'patterns' override the
      # type-based groups below.
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      # Group non-major updates to reduce PR noise.
      production-minor-and-patch:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      # devDependencies are grouped INCLUDING majors per audit doc §10-F.
      # Rationale: dev-deps (eslint, tsx, vitest, @types/*, prettier,
      # typescript-eslint) almost never break runtime — their majors
      # mostly tighten lint rules or add new diagnostics that are
      # surface-able and fixable in the same PR. Without this group,
      # every dev-dep major spawned its own PR (PR #130 alone bundled
      # 33 dev-dep bumps; before grouping each would have been a separate
      # 9-workflow run = ~450 wasted CI-min per Monday).
      development-all:
        dependency-type: 'development'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
    ignore:
      # Major upgrades of framework pins are coordinated manually
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']
      - dependency-name: '@prisma/client'
        update-types: ['version-update:semver-major']
      # @vitejs/plugin-react@6.x requires vite@8 (uses vite/internal subpath).
      # This repo pins vite '>=7.3.2 <8' via root pnpm.overrides, so the
      # complementary pin '@vitejs/plugin-react': '>=5.1.4 <6' was added in
      # #197. Without this ignore, Dependabot keeps proposing 5→6 and
      # fails its update job with ERR_PNPM_NO_MATCHING_VERSION
      # (>=6.0.2 <6 is impossible), turning the Dependabot check on main
      # publicly red on every run.
      - dependency-name: '@vitejs/plugin-react'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
    groups:
      # GitHub Actions bumps (incl. majors) are grouped — they're build-
      # graph changes, no runtime impact. Majors are typically just Node
      # runtime version bumps for the action itself (Node 16 → 20 → 24).
      # Per audit §10-F.
      actions-all:
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
    ignore:
      # amondnet/vercel-action is unmaintained and was replaced repo-wide
      # by the modern `vercel` CLI (see pr-checks.yml, cd.yml). Dependabot
      # kept proposing upgrades (PR #121 was the latest). Ignore so this
      # never reopens.
      - dependency-name: 'amondnet/vercel-action'
