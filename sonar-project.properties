# =============================================================================
# IntelliFlow CRM - SonarQube Project Configuration
# =============================================================================

# Project identification (SonarQube Cloud — talyssonoliver org)
sonar.projectKey=talyssonoliver_IntelliFlow-CRM
sonar.organization=talyssonoliver
sonar.projectName=IntelliFlow CRM
sonar.projectVersion=0.1.0

# Host: SonarQube Cloud (https://sonarcloud.io) is selected automatically by the
# presence of `sonar.organization` above — do NOT set sonar.host.url here, or the
# scanner targets a self-hosted server. For LOCAL self-hosted SonarQube runs
# (docker-compose.sonarqube.yml) set SONAR_HOST_URL=http://localhost:9000 in
# .env.local instead of pinning it in this committed file.
# sonar.host.url=http://localhost:9000

# Authentication (token loaded from environment or .env.local)
# sonar.token=<your-token-here>

# Source code paths
# Keep this list source-only to avoid scanning runtime/build outputs (e.g. `.next/`).
sonar.sources=\
  apps/api/src,\
  apps/ai-worker/src,\
  apps/web/src,\
  apps/project-tracker/app,\
  apps/project-tracker/components,\
  apps/project-tracker/lib,\
  packages/adapters/src,\
  packages/api-client/src,\
  packages/application/src,\
  packages/db/src,\
  packages/domain/src,\
  packages/observability/src,\
  packages/platform/src,\
  packages/ui/src,\
  packages/validators/src

# Tests are validated separately via CI; keep Sonar's test roots minimal to avoid
# traversing runtime/build output directories under apps/.
sonar.tests=tests

# File inclusions/exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/migrations/**,\
  **/*.config.js,\
  **/*.config.ts,\
  apps/web/src/components/sidebar/sidebar-types.ts

sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Language-specific settings
# Merged coverage is written to artifacts/coverage/lcov.info by
# scripts/run-coverage.js (pnpm test:coverage).  TDD watch-mode Vitest
# writes to artifacts/coverage-vitest/ so it never overwrites the merged data.
sonar.javascript.lcov.reportPaths=artifacts/coverage/lcov.info
sonar.typescript.lcov.reportPaths=artifacts/coverage/lcov.info

# Increase Node.js heap for the JS/TS sensor (default 4288 MB is too low for this repo).
# The OS has ~64 GB; 8192 MB gives the sensor enough room to analyse all 1500+ files.
sonar.javascript.node.maxspace=8192

# Code coverage
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.config.ts,\
  **/*.config.js,\
  **/migrations/**,\
  apps/api/src/tracing/example.ts,\
  apps/project-tracker/app/api/**,\
  apps/project-tracker/components/**,\
  apps/project-tracker/lib/data-sync.ts,\
  apps/project-tracker/lib/data-sync/**,\
  apps/ai-worker/src/index.ts,\
  packages/domain/src/crm/contact/ContactRepository.ts,\
  apps/web/src/app/**/page.tsx,\
  apps/api/src/lib/supabase.ts

# Source encoding
sonar.sourceEncoding=UTF-8

# Analysis parameters
sonar.scm.disabled=false
sonar.scm.provider=git

# Quality gate settings
sonar.qualitygate.wait=false

# Sonar rule suppressions (kept narrow and explicit)
sonar.issue.ignore.multicriteria=tableHeader,cssAtRuleWeb,cssAtRuleTracker,rechartsCellSentiment,rechartsCellNps,rechartsCellDeals,execCommand,trpcSubscription
sonar.issue.ignore.multicriteria.tableHeader.ruleKey=typescript:S5256
sonar.issue.ignore.multicriteria.tableHeader.resourceKey=packages/ui/src/components/table.tsx
# Tailwind CSS v4 at-rules (@custom-variant, @source, @utility) are valid syntax
# but unrecognised by SonarQube's CSS parser — suppress css:S4662 for these files.
sonar.issue.ignore.multicriteria.cssAtRuleWeb.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.cssAtRuleWeb.resourceKey=apps/web/src/app/globals.css
sonar.issue.ignore.multicriteria.cssAtRuleTracker.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.cssAtRuleTracker.resourceKey=apps/project-tracker/app/globals.css
# recharts 3.x `Cell` import — flagged as deprecated by Sonar's stale rule data,
# but is an active, documented export in recharts 3.6+. Ticket: upstream rule update.
sonar.issue.ignore.multicriteria.rechartsCellSentiment.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.rechartsCellSentiment.resourceKey=apps/web/src/components/feedback-analytics/SentimentDistributionChart.tsx
sonar.issue.ignore.multicriteria.rechartsCellNps.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.rechartsCellNps.resourceKey=apps/web/src/components/feedback-analytics/NpsBreakdownBar.tsx
sonar.issue.ignore.multicriteria.rechartsCellDeals.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.rechartsCellDeals.resourceKey=apps/web/src/components/deals/DealsCharts.tsx
# document.execCommand — deprecated but required for contentEditable rich-text
# formatting. Selection-API migration tracked as separate tech-debt task.
sonar.issue.ignore.multicriteria.execCommand.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.execCommand.resourceKey=apps/web/src/components/email/EmailCompose.tsx
# tRPC v10 observable subscription — deprecated in v11 (async iterator migration
# tracked separately). Keeping current implementation until migration sprint.
sonar.issue.ignore.multicriteria.trpcSubscription.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.trpcSubscription.resourceKey=apps/api/src/modules/notifications/notifications.router.ts

# Host URL (uncomment and set when using remote SonarQube server)
# sonar.host.url=http://localhost:9000

# Authentication
# - Recommended: set `SONAR_TOKEN` in your environment or `.env.local` (do not commit tokens).
# - Avoid setting `sonar.login`/`sonar.token` here with placeholders; the scanner does not expand `${env.*}`.
